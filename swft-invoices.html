<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SWFT — Invoices</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--surface:#111111;--surface2:#181818;--border:#1f1f1f;--border2:#2c2c2c;--green:#c8f135;--white:#f0f0f0;--gray:#7a7a7a;--gray2:#444444;--blue:#4d9fff;--amber:#f5a623;--red:#ff5252;--sidebar-w:228px;}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:#0a0a0a;}
body{visibility:hidden;background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);}
.sidebar.collapsed{transform:translateX(-100%);}
.collapse-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);flex-shrink:0;transition:all 0.14s;}
.collapse-btn:hover{background:var(--surface2);color:var(--white);}
.sidebar-toggle{position:fixed;top:14px;left:14px;z-index:9000;width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all 0.15s;opacity:0;pointer-events:none;}
.sidebar-toggle.visible{opacity:1;pointer-events:all;}
.logo-wrap{padding:26px 22px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--white);line-height:1;}
.logo-mark em{color:var(--green);font-style:normal;}
.logo-sub{font-size:9.5px;color:var(--gray2);letter-spacing:1.8px;margin-top:3px;font-weight:300;}
.nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.nav-label{font-size:9.5px;letter-spacing:2.5px;color:var(--gray2);text-transform:uppercase;padding:14px 12px 5px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:400;color:var(--gray);transition:background 0.14s,color 0.14s;position:relative;user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--white);}
.nav-item.active{background:rgba(200,241,53,0.07);color:var(--green);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--green);border-radius:0 3px 3px 0;}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:0.8;}
.nav-item.active .nav-icon{opacity:1;}
.sidebar-footer{border-top:1px solid var(--border);padding:12px 10px;}
.user-tile{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:background 0.14s;}
.user-tile:hover{background:var(--surface2);}
.s-avatar{width:30px;height:30px;border-radius:50%;background:var(--green);color:#0a0a0a;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-name{font-size:12px;font-weight:500;color:var(--white);}
.user-role{font-size:10.5px;color:var(--gray2);margin-top:1px;}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left 0.28s cubic-bezier(0.22,1,0.36,1);}
.main.expanded{margin-left:0!important;}
.main.expanded .topbar{padding-left:56px;}
.topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;background:rgba(10,10,10,0.9);backdrop-filter:blur(14px);z-index:100;}
.topbar-page{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2.5px;color:var(--white);}
.topbar-slash{color:var(--border2);font-family:'JetBrains Mono',monospace;font-size:16px;}
.topbar-sub{font-size:12px;color:var(--gray);font-style:italic;font-weight:300;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.btn-primary{display:flex;align-items:center;gap:7px;background:var(--green);color:#0a0a0a;font-weight:700;font-size:12.5px;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;transition:all 0.18s;}
.btn-primary:hover{background:#d5ff40;transform:translateY(-1px);}
.page-body{flex:1;padding:28px;display:flex;flex-direction:column;gap:18px;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px 20px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c);}
.stat-card.c-blue{--c:var(--blue);}.stat-card.c-green{--c:var(--green);}.stat-card.c-amber{--c:var(--amber);}.stat-card.c-red{--c:var(--red);}
.stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:var(--white);line-height:1;margin-top:5px;}
.stat-sub{font-size:11px;color:var(--gray2);margin-top:4px;}
.toolbar{display:flex;align-items:center;gap:10px;}
.search-wrap{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:9px 14px;flex:1;max-width:320px;transition:border-color 0.15s;}
.search-wrap:focus-within{border-color:var(--green);}
.search-input{background:transparent;border:none;outline:none;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;flex:1;}
.search-input::placeholder{color:var(--gray2);}
.filter-group{display:flex;gap:4px;}
.ftab{font-size:11.5px;font-weight:500;padding:7px 13px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);color:var(--gray);transition:all 0.14s;user-select:none;}
.ftab:hover{color:var(--white);border-color:var(--gray2);}
.ftab.active{background:rgba(200,241,53,0.1);color:var(--green);border-color:rgba(200,241,53,0.25);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.table-head{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 0.8fr 50px;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
.th{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray2);font-weight:600;}
.inv-row{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 0.8fr 50px;padding:13px 20px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.12s;}
.inv-row:last-child{border-bottom:none;}.inv-row:hover{background:var(--surface2);}
.inv-customer{font-size:13px;font-weight:500;color:var(--white);}
.inv-job{font-size:11px;color:var(--gray);margin-top:2px;}
.inv-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gray);}
.inv-total{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--white);}
.status-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:0.4px;display:inline-block;}
.s-open{background:rgba(245,166,35,0.12);color:var(--amber);}
.s-paid{background:rgba(200,241,53,0.12);color:var(--green);}
.s-draft{background:rgba(100,100,100,0.12);color:var(--gray);}
.row-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray2);transition:all 0.14s;margin-left:auto;}
.row-btn:hover{background:var(--surface2);color:var(--green);border-color:var(--green);}
.empty-state{text-align:center;padding:40px;color:var(--gray);font-size:13px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s;padding:24px;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(0.96);transition:transform 0.25s cubic-bezier(0.22,1,0.36,1);box-shadow:0 24px 80px rgba(0,0,0,0.6);}
.modal-overlay.open .modal{transform:scale(1);}
.m-header{padding:20px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;}
.m-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all 0.14s;}
.m-close:hover{background:var(--surface2);color:var(--white);}
.m-body{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}
.m-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray2);font-weight:600;}
.field-input{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.15s;width:100%;}
.field-input:focus{border-color:var(--green);}
.field-input option{background:var(--surface2);}
.section-title{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gray2);margin-top:4px;}
.li-table{background:var(--surface2);border:1px solid var(--border);border-radius:11px;overflow:hidden;}
.li-head{display:grid;grid-template-columns:2.2fr 0.6fr 0.8fr 0.8fr 30px;padding:9px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
.li-th{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray2);}
.li-row{display:grid;grid-template-columns:2.2fr 0.6fr 0.8fr 0.8fr 30px;padding:8px 14px;border-bottom:1px solid var(--border);align-items:center;gap:6px;}
.li-row:last-child{border-bottom:none;}
.li-input{background:transparent;border:1px solid transparent;border-radius:5px;padding:5px 7px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border-color 0.14s;width:100%;}
.li-input:focus{border-color:var(--green);background:rgba(200,241,53,0.03);}
.li-input.mono{font-family:'JetBrains Mono',monospace;font-size:11.5px;}
.li-input.total-col{color:var(--green);font-weight:500;}
.li-del{width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:var(--gray2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.12s;}
.li-del:hover{background:rgba(255,82,82,0.1);color:var(--red);}
.add-row{display:grid;grid-template-columns:2.2fr 0.6fr 0.8fr 0.8fr 30px;padding:8px 14px;gap:6px;border-top:1px solid var(--border);background:rgba(200,241,53,0.02);}
.add-input{background:transparent;border:1px solid var(--border2);border-radius:5px;padding:5px 7px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;width:100%;}
.add-input:focus{border-color:var(--green);}
.add-btn{width:22px;height:22px;border-radius:5px;background:rgba(200,241,53,0.1);border:1px solid rgba(200,241,53,0.2);color:var(--green);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.add-btn:hover{background:rgba(200,241,53,0.2);}
.totals{display:flex;justify-content:flex-end;gap:20px;padding:8px 0;}
.total-item{text-align:right;}
.total-label{font-size:10px;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;}
.total-value{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--green);font-weight:600;margin-top:2px;}
.note-area{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;min-height:70px;resize:vertical;line-height:1.5;width:100%;transition:border-color 0.15s;}
.note-area:focus{border-color:var(--green);}
.m-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;}
.mf-btn{padding:9px 18px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--gray);font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:all 0.14s;display:flex;align-items:center;gap:6px;}
.mf-btn:hover{background:var(--surface2);color:var(--white);}
.mf-btn.primary{background:var(--green);color:#0a0a0a;font-weight:700;border-color:var(--green);}
.mf-btn.primary:hover{background:#d5ff40;}
.mf-btn.danger{color:var(--red);border-color:rgba(255,82,82,0.2);}
.mf-btn.danger:hover{background:rgba(255,82,82,0.07);}
.mf-spacer{flex:1;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px 20px;font-size:13px;color:var(--white);display:flex;align-items:center;gap:8px;z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="logo-wrap"><div><div class="logo-mark">SWFT<em>.</em></div><div class="logo-sub">simple. smart. swft.</div></div><div class="collapse-btn" onclick="toggleSidebar()"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="12" x2="15" y2="12" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="18" x2="9" y2="18" stroke-width="2" stroke-linecap="round"/></svg></div></div>
  <nav class="nav">
    <div class="nav-label">Main</div>
    <div class="nav-item" onclick="window.location.href='swft-shell.html'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke-width="1.8"/></svg>Dashboard</div>
    <div class="nav-item" onclick="window.location.href='swft-customers.html'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="1.8"/><circle cx="9" cy="7" r="4" stroke-width="1.8"/></svg>Customers</div>
    <div class="nav-item" onclick="window.location.href='swft-jobs.html'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke-width="1.8"/></svg>Jobs</div>
    <div class="nav-item" onclick="window.location.href='swft-quotes.html'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-width="1.8"/><polyline points="14,2 14,8 20,8" stroke-width="1.8"/></svg>Quotes</div>
    <div class="nav-item" onclick="window.location.href='swft-schedule.html'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke-width="1.8"/><line x1="16" y1="2" x2="16" y2="6" stroke-width="1.8"/><line x1="8" y1="2" x2="8" y2="6" stroke-width="1.8"/><line x1="3" y1="10" x2="21" y2="10" stroke-width="1.8"/></svg>Schedule</div>
    <div class="nav-item active"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23" stroke-width="1.8"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke-width="1.8" stroke-linecap="round"/></svg>Invoices</div>
    <div class="nav-item" onclick="window.location.href='swft-messages.html'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-width="1.8"/></svg>Messages</div>
  </nav>
  <div class="sidebar-footer"><div class="nav-item" onclick="window.location.href='swft-settings.html'" style="margin-bottom:4px;"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-width="1.8"/></svg>Settings</div>
    <div class="user-tile"><div class="s-avatar"></div><div><div class="user-name"></div><div class="user-role"></div></div></div>
  </div>
</aside>
<div class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="12" x2="21" y2="12" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="18" x2="21" y2="18" stroke-width="2" stroke-linecap="round"/></svg></div>

<div class="main" id="main">
  <header class="topbar">
    <div class="topbar-page">INVOICES</div><span class="topbar-slash">/</span>
    <div class="topbar-sub" id="inv-count">loading...</div>
    <div class="topbar-right"><button class="btn-primary" onclick="openNewInvoice()"><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke-width="2.5" stroke-linecap="round"/></svg>New Invoice</button></div>
  </header>
  <div class="page-body">
    <div class="stat-row" id="stat-row"></div>
    <div class="toolbar">
      <div class="search-wrap"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke-width="1.8"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke-width="1.8"/></svg><input class="search-input" placeholder="Search invoices..." oninput="filterInvoices(this.value)"/></div>
      <div class="filter-group">
        <div class="ftab active" onclick="setFilter(this,'all')">All</div>
        <div class="ftab" onclick="setFilter(this,'open')">Open</div>
        <div class="ftab" onclick="setFilter(this,'paid')">Paid</div>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-head"><div class="th">Customer / Job</div><div class="th">Service</div><div class="th">Due Date</div><div class="th">Total</div><div class="th">Status</div><div class="th"></div></div>
      <div id="inv-body"><div class="empty-state">Loading...</div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="m-header">
      <div><div id="m-title" style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--white);">New Invoice</div><div id="m-sub" style="font-size:11px;color:var(--gray);margin-top:2px;"></div></div>
      <button class="m-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="m-body">
      <div class="m-2col">
        <div class="field"><label class="field-label">Customer</label><select class="field-input" id="f-customer"></select></div>
        <div class="field"><label class="field-label">Status</label><select class="field-input" id="f-status"><option value="open">Open</option><option value="paid">Paid</option></select></div>
      </div>
      <div class="m-2col">
        <div class="field"><label class="field-label">Service</label><input class="field-input" id="f-service" placeholder="e.g. Stamped Concrete"/></div>
        <div class="field"><label class="field-label">Sqft</label><input class="field-input" id="f-sqft" placeholder="e.g. 500"/></div>
      </div>
      <div class="field"><label class="field-label">Address</label><input class="field-input" id="f-address" placeholder="Property address"/></div>
      <div class="m-2col">
        <div class="field"><label class="field-label">Due Date</label><input class="field-input" id="f-due" type="date"/></div>
        <div class="field"><label class="field-label">Finish</label><input class="field-input" id="f-finish" placeholder="e.g. Broom finish"/></div>
      </div>
      <div class="section-title">Line Items</div>
      <div class="li-table">
        <div class="li-head"><div class="li-th">Description</div><div class="li-th">Qty</div><div class="li-th">Rate</div><div class="li-th">Total</div><div></div></div>
        <div id="li-body"></div>
        <div class="add-row"><input class="add-input" id="add-desc" placeholder="Description..."/><input class="add-input" id="add-qty" placeholder="Qty" style="text-align:center;"/><input class="add-input" id="add-rate" placeholder="$ Rate"/><input class="add-input" id="add-total" placeholder="Total" readonly style="color:var(--green);"/><button class="add-btn" onclick="addLineItem()">+</button></div>
      </div>
      <div class="totals" id="totals-area"></div>
      <div class="section-title">Notes</div>
      <textarea class="note-area" id="f-notes" placeholder="Notes..."></textarea>
    </div>
    <div class="m-footer">
      <button class="mf-btn danger" id="btn-delete" onclick="deleteInvoice()" style="display:none;">Delete</button>
      <div class="mf-spacer"></div>
      <button class="mf-btn" onclick="closeModal()">Cancel</button>
      <button class="mf-btn" id="btn-paid" onclick="markPaid()" style="display:none;">Mark Paid</button>
      <button class="mf-btn primary" onclick="saveInvoice()">Save Invoice</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script>
var _invoices=[],_customers=[],_currentInv=null,_items=[],_filter='all',_search='';
function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('collapsed');document.getElementById('main').classList.toggle('expanded');document.getElementById('sidebar-toggle').classList.toggle('visible');}
var _tt;function showToast(m){var t=document.getElementById('toast');document.getElementById('toast-msg').textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2500);}

async function loadInvoices(){
  try{var res=await Promise.all([API.invoices.list(),API.customers.list()]);_invoices=res[0];_customers=res[1];renderStats();renderTable();}catch(e){console.error(e);}
}

function renderStats(){
  var total=_invoices.length,totalVal=0,paid=0,paidVal=0,open=0,openVal=0;
  _invoices.forEach(function(inv){var v=Number(inv.total)||0;totalVal+=v;if(inv.status==='paid'){paid++;paidVal+=v;}else{open++;openVal+=v;}});
  document.getElementById('inv-count').textContent=total+' invoices';
  document.getElementById('stat-row').innerHTML=
    '<div class="stat-card c-blue"><div class="stat-label">Total Invoiced</div><div class="stat-value">'+total+'</div><div class="stat-sub">$'+totalVal.toLocaleString()+' total</div></div>'+
    '<div class="stat-card c-green"><div class="stat-label">Collected</div><div class="stat-value">'+paid+'</div><div class="stat-sub">$'+paidVal.toLocaleString()+'</div></div>'+
    '<div class="stat-card c-amber"><div class="stat-label">Outstanding</div><div class="stat-value">'+open+'</div><div class="stat-sub">$'+openVal.toLocaleString()+'</div></div>'+
    '<div class="stat-card c-red"><div class="stat-label">Overdue</div><div class="stat-value">0</div><div class="stat-sub">&nbsp;</div></div>';
}

function renderTable(){
  var body=document.getElementById('inv-body');
  var list=_invoices.slice();
  if(_filter!=='all')list=list.filter(function(inv){return inv.status===_filter;});
  if(_search){var s=_search.toLowerCase();list=list.filter(function(inv){return(inv.customerName||'').toLowerCase().indexOf(s)>-1;});}
  if(!list.length){body.innerHTML='<div class="empty-state">No invoices found</div>';return;}
  body.innerHTML=list.map(function(inv){
    var due=inv.dueDate?new Date(inv.dueDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    var total='$'+Number(inv.total||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    var sc=inv.status==='paid'?'s-paid':'s-open';
    return '<div class="inv-row" onclick="openInvoice(\''+inv.id+'\')">'+
      '<div><div class="inv-customer">'+(inv.customerName||'Unnamed')+'</div><div class="inv-job">'+(inv.service||'')+'</div></div>'+
      '<div class="inv-date">'+(inv.service||'—')+'</div>'+
      '<div class="inv-date">'+due+'</div>'+
      '<div class="inv-total">'+total+'</div>'+
      '<div><span class="status-pill '+sc+'">'+(inv.status||'open')+'</span></div>'+
      '<div><div class="row-btn">→</div></div></div>';
  }).join('');
}

function setFilter(el,f){_filter=f;document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');renderTable();}
function filterInvoices(q){_search=q;renderTable();}

async function openInvoice(id){
  try{var inv=await API.invoices.get(id);_currentInv=inv;_items=(inv.items||[]).map(function(i){return{desc:i.desc||'',qty:Number(i.qty)||1,rate:Number(i.rate)||0,total:Number(i.total)||0};});populateModal(inv);document.getElementById('btn-delete').style.display='';document.getElementById('btn-paid').style.display=inv.status!=='paid'?'':'none';document.getElementById('modal-overlay').classList.add('open');}catch(e){showToast('Error loading invoice');}
}

function openNewInvoice(){_currentInv=null;_items=[];populateModal({});document.getElementById('btn-delete').style.display='none';document.getElementById('btn-paid').style.display='none';document.getElementById('m-title').textContent='New Invoice';document.getElementById('m-sub').textContent='';document.getElementById('modal-overlay').classList.add('open');}

function populateModal(inv){
  document.getElementById('m-title').textContent=inv.customerName||'New Invoice';
  document.getElementById('m-sub').textContent=inv.id?'Created '+new Date(inv.createdAt).toLocaleDateString():'';
  var sel=document.getElementById('f-customer');sel.innerHTML='<option value="">Select customer...</option>';
  _customers.forEach(function(c){var o=document.createElement('option');o.value=c.id;o.textContent=c.name||'Unnamed';if(c.id===inv.customerId)o.selected=true;sel.appendChild(o);});
  document.getElementById('f-status').value=inv.status||'open';
  document.getElementById('f-service').value=inv.service||'';
  document.getElementById('f-sqft').value=inv.sqft||'';
  document.getElementById('f-address').value=inv.address||'';
  document.getElementById('f-finish').value=inv.finish||'';
  document.getElementById('f-notes').value=inv.notes||'';
  document.getElementById('f-due').value=inv.dueDate?new Date(inv.dueDate).toISOString().split('T')[0]:'';
  renderLineItems();
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

function renderLineItems(){
  document.getElementById('li-body').innerHTML=_items.map(function(item,i){
    return '<div class="li-row"><input class="li-input" value="'+esc(item.desc)+'" onchange="updateItem('+i+',\'desc\',this.value)"/><input class="li-input mono" value="'+item.qty+'" type="number" min="1" style="text-align:center;" onchange="updateItem('+i+',\'qty\',this.value)"/><input class="li-input mono" value="'+item.rate.toFixed(2)+'" type="number" step="0.01" onchange="updateItem('+i+',\'rate\',this.value)"/><div class="li-input mono total-col" style="border:none;">$'+item.total.toFixed(2)+'</div><button class="li-del" onclick="removeItem('+i+')">&times;</button></div>';
  }).join('');
  renderTotals();
}

function updateItem(i,field,val){
  if(field==='desc')_items[i].desc=val;
  else if(field==='qty'){_items[i].qty=Number(val)||1;_items[i].total=_items[i].qty*_items[i].rate;}
  else if(field==='rate'){_items[i].rate=Number(val)||0;_items[i].total=_items[i].qty*_items[i].rate;}
  renderLineItems();
}
function removeItem(i){_items.splice(i,1);renderLineItems();}

function addLineItem(){
  var desc=document.getElementById('add-desc').value.trim();var qty=Number(document.getElementById('add-qty').value)||1;var rate=Number(document.getElementById('add-rate').value)||0;
  if(!desc){showToast('Enter a description');return;}
  _items.push({desc:desc,qty:qty,rate:rate,total:qty*rate});
  document.getElementById('add-desc').value='';document.getElementById('add-qty').value='';document.getElementById('add-rate').value='';document.getElementById('add-total').value='';
  renderLineItems();
}

['add-qty','add-rate'].forEach(function(id){document.getElementById(id).addEventListener('input',function(){var q=parseFloat(document.getElementById('add-qty').value)||0;var r=parseFloat(document.getElementById('add-rate').value)||0;document.getElementById('add-total').value=q&&r?'$'+(q*r).toFixed(2):'';});});

function renderTotals(){
  var subtotal=_items.reduce(function(s,i){return s+i.total;},0);
  document.getElementById('totals-area').innerHTML='<div class="total-item"><div class="total-label">Total</div><div class="total-value">$'+subtotal.toFixed(2)+'</div></div>';
}

async function saveInvoice(){
  var custSel=document.getElementById('f-customer');var custOpt=custSel.options[custSel.selectedIndex];
  if(!custSel.value){showToast('Select a customer');return;}
  var total=_items.reduce(function(s,i){return s+i.total;},0);
  var data={customerId:custSel.value,customerName:custOpt.textContent,items:_items,total:total,status:document.getElementById('f-status').value,service:document.getElementById('f-service').value,sqft:document.getElementById('f-sqft').value,address:document.getElementById('f-address').value,finish:document.getElementById('f-finish').value,notes:document.getElementById('f-notes').value,dueDate:document.getElementById('f-due').value?new Date(document.getElementById('f-due').value).getTime():null};
  try{
    if(_currentInv&&_currentInv.id){await API.invoices.update(_currentInv.id,data);showToast('Invoice saved');}
    else{await API.invoices.create(data);showToast('Invoice created');}
    closeModal();loadInvoices();
  }catch(e){showToast('Error: '+e.message);}
}

async function markPaid(){
  if(!_currentInv||!_currentInv.id)return;
  try{await API.invoices.pay(_currentInv.id,{});showToast('Invoice marked as paid');closeModal();loadInvoices();}catch(e){showToast('Error: '+e.message);}
}

async function deleteInvoice(){
  if(!_currentInv||!_currentInv.id)return;
  if(!confirm('Delete this invoice? This cannot be undone.'))return;
  try{await API.invoices.delete(_currentInv.id);showToast('Invoice deleted');closeModal();loadInvoices();}catch(e){showToast('Error: '+e.message);}
}

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
