<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png"/>

<style>
:root{--bg:#0a0a0a;--surface:#111111;--surface2:#181818;--border:#1f1f1f;--border2:#2c2c2c;--green:#c8f135;--white:#f0f0f0;--gray:#7a7a7a;--gray2:#444444;--blue:#4d9fff;--amber:#f5a623;--red:#ff5252;--purple:#b388ff;--sidebar-w:228px;}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:#0a0a0a;}
body{visibility:hidden;background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);}
.sidebar.collapsed{transform:translateX(-100%);}
.collapse-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);flex-shrink:0;transition:all 0.14s;}
.collapse-btn:hover{background:var(--surface2);color:var(--white);}
.sidebar-toggle{position:fixed;top:14px;left:14px;z-index:9000;width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all 0.15s;opacity:0;pointer-events:none;}
.sidebar-toggle.visible{opacity:1;pointer-events:all;}
.sidebar-toggle:hover{background:var(--surface2);color:var(--white);}
.logo-wrap{padding:26px 22px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo-mark{font-family:'Space Mono',monospace;font-weight:700;font-size:26px;letter-spacing:0;text-transform:uppercase;color:var(--white);line-height:1;display:inline-flex;align-items:baseline;}
.logo-mark em{display:block;width:5px;height:5px;background:var(--green);flex-shrink:0;margin-left:3px;margin-bottom:0;}
.logo-sub{font-size:9.5px;color:var(--gray2);letter-spacing:1.8px;margin-top:3px;font-weight:300;}
.nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.nav-label{font-size:9.5px;letter-spacing:2.5px;color:var(--gray2);text-transform:uppercase;padding:14px 12px 5px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:400;color:var(--gray);transition:background 0.14s,color 0.14s;position:relative;user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--white);}
.nav-item.active{background:rgba(200,241,53,0.07);color:var(--green);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--green);border-radius:0 3px 3px 0;}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:0.8;}
.nav-item.active .nav-icon{opacity:1;}
.sidebar-footer{border-top:1px solid var(--border);padding:12px 10px;}
.user-tile{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:background 0.14s;}
.user-tile:hover{background:var(--surface2);}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--green);color:#0a0a0a;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-name{font-size:12px;font-weight:500;color:var(--white);}
.user-role{font-size:10.5px;color:var(--gray2);margin-top:1px;}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left 0.28s cubic-bezier(0.22,1,0.36,1);}
.main.expanded{margin-left:0 !important;}
.topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;background:rgba(10,10,10,0.9);backdrop-filter:blur(14px);z-index:100;animation:fadeDown 0.3s ease 0.15s both;transition:padding-left 0.28s cubic-bezier(0.22,1,0.36,1);}
.main.expanded .topbar{padding-left:56px;}
.topbar-page{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2.5px;color:var(--white);}
.topbar-slash{color:var(--border2);font-family:'JetBrains Mono',monospace;font-size:16px;}
.topbar-sub{font-size:12px;color:var(--gray);font-style:italic;font-weight:300;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.page-body{flex:1;padding:20px 28px 28px;display:flex;flex-direction:column;gap:14px;min-height:0;}
/* Clock In / Out button */
.clock-btn{display:flex;align-items:center;gap:8px;background:var(--surface);color:var(--gray);border:1px solid var(--border2);font-family:'DM Sans',sans-serif;font-weight:600;font-size:12.5px;padding:8px 16px;border-radius:9px;cursor:pointer;transition:all 0.16s;}
.clock-btn:hover{color:var(--white);border-color:var(--gray);}
.clock-btn.on{background:var(--green);border-color:var(--green);color:#0a0a0a;}
.clock-btn.on:hover{background:#d5ff40;box-shadow:0 4px 18px rgba(200,241,53,0.22);}
.clock-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--gray2);transition:all 0.16s;}
.clock-btn.on .dot{background:#0a0a0a;box-shadow:0 0 0 2px rgba(0,0,0,0.15);}

/* 2-column split: member list + map */
.tracker-split{flex:1;display:grid;grid-template-columns:300px 1fr;gap:14px;min-height:0;}
@media (max-width:860px){.tracker-split{grid-template-columns:1fr;grid-template-rows:auto 1fr;}}

/* Member list panel */
.member-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;min-height:0;overflow:hidden;animation:fadeUp 0.4s ease both;}
.member-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gray2);font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.member-count{color:var(--green);font-family:'JetBrains Mono',monospace;letter-spacing:0;font-size:11px;}
.member-list{flex:1;overflow-y:auto;padding:6px 6px 10px;}
.member-row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:9px;cursor:pointer;transition:background 0.14s;}
.member-row:hover{background:var(--surface2);}
.member-row.selected{background:rgba(200,241,53,0.06);}
.member-avatar{width:34px;height:34px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.member-avatar.owner{background:var(--green);color:#0a0a0a;}
.member-avatar.admin{background:var(--blue);color:#fff;}
.member-avatar.office{background:var(--purple);color:#fff;}
.member-avatar.technician{background:var(--amber);color:#0a0a0a;}
.member-info{flex:1;min-width:0;}
.member-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-meta{font-size:11px;color:var(--gray);margin-top:2px;display:flex;align-items:center;gap:6px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--gray2);flex-shrink:0;}
.status-dot.on{background:var(--green);box-shadow:0 0 6px rgba(200,241,53,0.5);}

/* Optimize Route — per-member action */
.member-optimize{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);flex-shrink:0;transition:all 0.14s;}
.member-optimize:hover{background:var(--surface2);color:var(--green);border-color:var(--green);}
.member-optimize:disabled{opacity:0.5;cursor:wait;}

/* Route panel — overlay in top-right of map when a route is rendered */
.route-panel{position:absolute;top:14px;right:14px;width:320px;max-width:calc(100% - 28px);max-height:calc(100% - 28px);background:var(--surface);border:1px solid var(--border2);border-radius:12px;box-shadow:0 12px 48px rgba(0,0,0,0.55);z-index:5;display:none;flex-direction:column;overflow:hidden;animation:fadeUp 0.25s ease both;}
.route-panel.open{display:flex;}
.route-panel-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.route-panel-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--white);}
.route-panel-close{width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.route-panel-close:hover{background:var(--surface2);color:var(--white);}
.route-stats{padding:10px 14px;display:flex;gap:14px;border-bottom:1px solid var(--border);font-size:12px;}
.route-stat{display:flex;flex-direction:column;gap:2px;}
.route-stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--green);}
.route-stat-lbl{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--gray2);}
.route-stops{flex:1;overflow-y:auto;padding:6px 8px 10px;}
.route-stop{display:flex;gap:10px;padding:8px 8px;border-radius:8px;}
.route-stop + .route-stop{margin-top:4px;}
.route-stop:hover{background:var(--surface2);}
.route-stop-num{width:22px;height:22px;border-radius:50%;background:var(--green);color:#0a0a0a;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.route-stop-body{flex:1;min-width:0;}
.route-stop-name{font-size:12.5px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.route-stop-addr{font-size:11px;color:var(--gray);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.route-stop-leg{font-size:10.5px;color:var(--gray2);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.route-panel-footer{padding:8px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;}
.route-truncated{font-size:10.5px;color:var(--amber);padding:8px 14px;background:rgba(245,166,35,0.06);border-bottom:1px solid var(--border);}

/* Map container */
.map-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;min-height:0;animation:fadeUp 0.4s ease both;}
#map{width:100%;height:100%;min-height:420px;}
.map-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,10,10,0.6);backdrop-filter:blur(2px);color:var(--gray);font-size:13px;text-align:center;padding:24px;z-index:2;}
.map-overlay.hidden{display:none;}
.map-overlay a{color:var(--green);text-decoration:none;border-bottom:1px dashed rgba(200,241,53,0.4);}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px 20px;font-size:13px;color:var(--white);display:flex;align-items:center;gap:8px;z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;box-shadow:0 8px 32px rgba(0,0,0,0.4);max-width:calc(100vw - 32px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>

<div class="main" id="main">

    <div class="tracker-split">
      <div class="member-panel">
        <div class="member-panel-header">
          <span>Team</span>
          <span class="member-count" id="member-count">0</span>
        </div>
        <div class="member-list" id="member-list"></div>
      </div>
      <div class="map-wrap">
        <div id="map"></div>
        <div class="map-overlay" id="map-overlay">Loading map…</div>
        <div class="route-panel" id="route-panel">
          <div class="route-panel-header">
            <div class="route-panel-title" id="route-panel-title">Optimized Route</div>
            <button class="route-panel-close" onclick="clearRoute()" title="Clear route">&times;</button>
          </div>
          <div class="route-stats" id="route-stats"></div>
          <div class="route-truncated" id="route-truncated" style="display:none;"></div>
          <div class="route-stops" id="route-stops"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="swft-api.js"></script>
<script src="swft-confirm.js"></script>
<script src="swft-settings-loader.js"></script>

<script>
/* ── State ── */
var _map = null;
var _markers = {};            // uid -> google.maps.Marker
var _members = [];
var _myUid = null;
var _myClockedIn = false;
var _watchId = null;
var _pollTimer = null;
var _mapReady = false;
var _mapLoading = false;

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('collapsed');
  document.getElementById('main').classList.toggle('expanded');
  document.getElementById('sidebar-toggle').classList.toggle('visible');
}

function showToast(msg){
  var t = document.getElementById('toast');
  var m = document.getElementById('toast-msg');
  if(!t||!m) return;
  m.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

function fmtAgo(ms){
  if(!ms) return 'never';
  var s = Math.max(0, Math.floor((Date.now() - ms) / 1000));
  if(s < 10) return 'just now';
  if(s < 60) return s + 's ago';
  var m = Math.floor(s / 60);
  if(m < 60) return m + 'm ago';
  var h = Math.floor(m / 60);
  if(h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function initialsOf(name){
  if(!name) return '?';
  var parts = String(name).trim().split(/\s+/);
  return parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : name.slice(0, 2).toUpperCase();
}
async function loadMapsSdk(){
  if(_mapReady || _mapLoading) return;
  _mapLoading = true;
  try {
    var res = await API.user.mapsKey();
    if(!res || !res.key) throw new Error('Maps key unavailable');
    await new Promise(function(resolve, reject){
      var timer = setTimeout(function(){ reject(new Error('Maps SDK timeout')); }, 15000);
      window.__swftMapReady = function(){
        clearTimeout(timer);
        delete window.__swftMapReady;
        // Double-rAF: first frame enters the paint cycle,
        // second guarantees the flex layout has been computed
        // before Google Maps reads offsetWidth/offsetHeight.
        requestAnimationFrame(function(){
          requestAnimationFrame(function(){
            try { initMap(); } catch(e){ reject(e); return; }
            _mapReady = true;
            var ov = document.getElementById('map-overlay');
            if(ov) ov.classList.add('hidden');
            resolve();
          });
        });
      };
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(res.key) + '&v=3&loading=async&callback=__swftMapReady';
      s.onerror = function(){ clearTimeout(timer); reject(new Error('Failed to load Google Maps')); };
      document.head.appendChild(s);
    });
  } catch (e) {
    var overlay = document.getElementById('map-overlay');
    if(overlay) overlay.textContent = 'Map unavailable: ' + (e.message || 'error');
  } finally {
    _mapLoading = false;
  }
}

function initMap(){
  var mapEl = document.getElementById('map');
  // If the flex/grid layout hasn't resolved yet, force concrete pixel
  // dimensions so Google Maps loads tiles for a real viewport.
  if(mapEl.offsetWidth < 50){
    mapEl.style.width = (window.innerWidth - 28) + 'px';
  }
  if(mapEl.offsetHeight < 50){
    mapEl.style.height = Math.max(300, Math.round(window.innerHeight * 0.55)) + 'px';
  }
  var opts = {
    zoom: 12,
    center: { lat: 39.5, lng: -98.35 },
    disableDefaultUI: false,
    mapTypeControl: false,
    streetViewControl: false,
    styles: [
      { elementType: 'geometry',               stylers: [{ color: '#1a1a1a' }] },
      { elementType: 'labels.text.stroke',     stylers: [{ color: '#0a0a0a' }] },
      { elementType: 'labels.text.fill',       stylers: [{ color: '#7a7a7a' }] },
      { featureType: 'road',    elementType: 'geometry', stylers: [{ color: '#2c2c2c' }] },
      { featureType: 'water',   elementType: 'geometry', stylers: [{ color: '#111111' }] },
      { featureType: 'poi',     stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] },
    ],
  };
  _map = new google.maps.Map(mapEl, opts);
  // Trigger resize at multiple intervals — lets CSS layout finish
  // and replaces any inline dimensions we forced above.
  [300, 800, 1600].forEach(function(ms){
    setTimeout(function(){
      if(!_map) return;
      mapEl.style.width = '';
      mapEl.style.height = '';
      google.maps.event.trigger(_map, 'resize');
      _map.panTo(_map.getCenter());
    }, ms);
  });
}

function roleColor(role){
  return role === 'owner'      ? '#c8f135'
       : role === 'admin'      ? '#4d9fff'
       : role === 'office'     ? '#b388ff'
       : role === 'technician' ? '#f5a623'
       : '#7a7a7a';
}

// Center on the viewer's current position (one-shot, silent fallback).
// Skipped if renderMarkers has already centered on a pin bounds.
function centerOnViewer(){
  if(!_mapReady || !_map) return;
  if(renderMarkers._centeredOnce) return;
  if(!('geolocation' in navigator)) return;
  navigator.geolocation.getCurrentPosition(function(pos){
    if(renderMarkers._centeredOnce) return;
    _map.setCenter({ lat: pos.coords.latitude, lng: pos.coords.longitude });
    _map.setZoom(13);
  }, function(){ /* user declined or error — keep fallback center */ }, {
    enableHighAccuracy: false, maximumAge: 60000, timeout: 8000
  });
}

function infoHtml(m){
  var parts = [
    '<div style="font-family:DM Sans,sans-serif;color:#111;padding:2px 4px;min-width:180px;">',
      '<div style="font-weight:700;font-size:13px;">' + (m.name || '(unnamed)') + '</div>',
      '<div style="font-size:11px;color:#666;text-transform:capitalize;margin-top:1px;">' + m.role + '</div>',
  ];
  if(m.clockedIn && m.clockedInAt){
    parts.push('<div style="font-size:11px;color:#2a7a00;margin-top:6px;">● Clocked in ' + fmtAgo(m.clockedInAt) + '</div>');
  } else {
    parts.push('<div style="font-size:11px;color:#999;margin-top:6px;">○ Off the clock</div>');
  }
  if(m.location && m.location.updatedAt){
    parts.push('<div style="font-size:11px;color:#666;margin-top:2px;">Location updated ' + fmtAgo(m.location.updatedAt) + '</div>');
  }
  parts.push('</div>');
  return parts.join('');
}

function pinSvg(color, initials){
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="44" height="54" viewBox="0 0 44 54">' +
    '<path d="M22 0C9.85 0 0 9.85 0 22c0 16 22 32 22 32s22-16 22-32C44 9.85 34.15 0 22 0z" fill="' + color + '"/>' +
    '<circle cx="22" cy="22" r="13" fill="#0a0a0a"/>' +
    '<text x="22" y="27" text-anchor="middle" font-family="DM Sans,Arial,sans-serif" font-size="12" font-weight="700" fill="' + color + '">' + initials + '</text>' +
    '</svg>';
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}
async function loadLocations(){
  try {
    var res = await API.team.locations();
    _members = res.members || [];
    renderMembers();
    renderMarkers();
  } catch (e) {
    console.warn('[team-tracker] loadLocations failed:', e.message);
  }
}

function renderMembers(){
  var list = document.getElementById('member-list');
  var count = document.getElementById('member-count');
  if(!list) return;

  var clockedInCount = _members.filter(function(m){ return m.clockedIn; }).length;
  count.textContent = clockedInCount + '/' + _members.length;

  if(!_members.length){
    list.innerHTML = '<div style="padding:24px 14px;color:var(--gray);font-size:12.5px;text-align:center;">No teammates yet. Invite members from the Team page.</div>';
    return;
  }

  list.innerHTML = _members.map(function(m){
    var status = m.clockedIn ? 'Clocked in' : 'Off the clock';
    var updated = m.location ? ' · ' + fmtAgo(m.location.updatedAt) : '';
    var role = (m.role || 'technician').toLowerCase();
    var uid = m.uid || '';
    var optimizeBtn = uid
      ? '<button class="member-optimize" title="Optimize today\'s route" onclick="event.stopPropagation();optimizeRoute(\'' + uid + '\',this)">'
          + '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="5" cy="6" r="2" stroke-width="1.8"/><circle cx="19" cy="18" r="2" stroke-width="1.8"/><path d="M7 6h8a4 4 0 0 1 0 8H9a4 4 0 0 0 0 8h8" stroke-width="1.8" stroke-linecap="round"/></svg>'
        + '</button>'
      : '';
    return '<div class="member-row" data-uid="' + uid + '" onclick="focusMember(\'' + uid + '\')">'
      + '<div class="member-avatar ' + role + '">' + initialsOf(m.name || m.email) + '</div>'
      + '<div class="member-info">'
        + '<div class="member-name">' + (m.name || '(unnamed)') + '</div>'
        + '<div class="member-meta"><span class="status-dot ' + (m.clockedIn ? 'on' : '') + '"></span>' + status + updated + '</div>'
      + '</div>'
      + optimizeBtn
    + '</div>';
  }).join('');
}

function renderMarkers(){
  if(!_mapReady || !_map) return;
  var seen = {};
  var bounds = new google.maps.LatLngBounds();
  var hasPin = false;

  _members.forEach(function(m){
    var uid = m.uid;
    if(!uid || !m.location || typeof m.location.lat !== 'number' || typeof m.location.lng !== 'number'){
      return;
    }
    seen[uid] = true;
    var pos = { lat: m.location.lat, lng: m.location.lng };
    var color = roleColor(m.role);
    var inits = initialsOf(m.name || m.email);
    if(_markers[uid]){
      _markers[uid].setPosition(pos);
      _markers[uid].setTitle(m.name || '');
      _markers[uid]._info.setContent(infoHtml(m));
    } else {
      var marker = new google.maps.Marker({
        position: pos,
        map: _map,
        title: m.name || '',
        icon: { url: pinSvg(color, inits), scaledSize: new google.maps.Size(36, 44), anchor: new google.maps.Point(18, 44) },
      });
      marker._info = new google.maps.InfoWindow({ content: infoHtml(m) });
      marker.addListener('click', function(){ marker._info.open(_map, marker); });
      _markers[uid] = marker;
    }
    bounds.extend(pos);
    hasPin = true;
  });

  // Remove stale markers (clocked out / no location)
  Object.keys(_markers).forEach(function(uid){
    if(!seen[uid]){ _markers[uid].setMap(null); delete _markers[uid]; }
  });

  if(hasPin && !renderMarkers._centeredOnce){
    _map.fitBounds(bounds, 80);
    if(_map.getZoom() > 15) _map.setZoom(15);
    renderMarkers._centeredOnce = true;
  }
}

function focusMember(uid){
  if(!uid || !_mapReady) return;
  var m = _members.find(function(x){ return x.uid === uid; });
  if(!m || !m.location) {
    showToast((m && m.name ? m.name : 'This member') + ' has no live location yet');
    return;
  }
  _map.panTo({ lat: m.location.lat, lng: m.location.lng });
  _map.setZoom(15);
  if(_markers[uid]) google.maps.event.trigger(_markers[uid], 'click');
  document.querySelectorAll('.member-row').forEach(function(el){ el.classList.remove('selected'); });
  var row = document.querySelector('.member-row[data-uid="' + uid + '"]');
  if(row) row.classList.add('selected');
}

/* ── Route optimization ── */
var _routePolyline = null;
var _routeStopMarkers = [];

// Google encoded polyline decoder — copied from the standard algorithm so we
// don't need the geometry library. Returns an array of {lat,lng}.
function decodePolyline(encoded){
  if(!encoded) return [];
  var points = [], index = 0, lat = 0, lng = 0;
  while(index < encoded.length){
    var b, shift = 0, result = 0;
    do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    var dlat = ((result & 1) ? ~(result >> 1) : (result >> 1)); lat += dlat;
    shift = 0; result = 0;
    do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    var dlng = ((result & 1) ? ~(result >> 1) : (result >> 1)); lng += dlng;
    points.push({ lat: lat / 1e5, lng: lng / 1e5 });
  }
  return points;
}

function clearRoute(){
  if(_routePolyline){ _routePolyline.setMap(null); _routePolyline = null; }
  _routeStopMarkers.forEach(function(m){ m.setMap(null); });
  _routeStopMarkers = [];
  var panel = document.getElementById('route-panel');
  if(panel) panel.classList.remove('open');
}

function fmtDuration(sec){
  if(!sec) return '0m';
  var h = Math.floor(sec / 3600);
  var m = Math.round((sec % 3600) / 60);
  if(h && m) return h + 'h ' + m + 'm';
  if(h) return h + 'h';
  return m + 'm';
}
function fmtMiles(meters){
  if(!meters) return '0 mi';
  return (meters * 0.000621371).toFixed(1) + ' mi';
}
function numberPinSvg(n){
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">' +
    '<path d="M16 0C7.16 0 0 7.16 0 16c0 11.64 16 24 16 24s16-12.36 16-24C32 7.16 24.84 0 16 0z" fill="#c8f135"/>' +
    '<circle cx="16" cy="16" r="10" fill="#0a0a0a"/>' +
    '<text x="16" y="20" text-anchor="middle" font-family="DM Sans,Arial,sans-serif" font-size="11" font-weight="700" fill="#c8f135">' + n + '</text>' +
    '</svg>';
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}

async function optimizeRoute(techUid, btn){
  if(!_mapReady){ showToast('Map still loading…'); return; }
  if(btn) btn.disabled = true;
  var member = _members.find(function(x){ return x.uid === techUid; });
  var techName = (member && member.name) || 'Member';
  showToast('Optimizing ' + techName + "'s route…");
  try {
    var r = await API.team.optimizeRoute({ techUid: techUid });
    renderRoute(r, techName);
  } catch (e) {
    showToast(e.message || 'Optimize failed');
  } finally {
    if(btn) btn.disabled = false;
  }
}

function renderRoute(r, techName){
  clearRoute();
  if(!r || !r.orderedJobs || !r.orderedJobs.length){
    showToast('No route to show');
    return;
  }

  // Draw the polyline if we got one
  if(r.polyline){
    var path = decodePolyline(r.polyline);
    _routePolyline = new google.maps.Polyline({
      path: path,
      map: _map,
      strokeColor: '#c8f135',
      strokeOpacity: 0.9,
      strokeWeight: 4,
      zIndex: 50,
    });
    var bounds = new google.maps.LatLngBounds();
    path.forEach(function(p){ bounds.extend(p); });
    _map.fitBounds(bounds, 80);
  }

  // Drop numbered pins at each stop so the owner can see the order on the map.
  // We don't have lat/lng on jobs — only addresses — but the Directions legs
  // carry the geocoded endpoint coordinates via the polyline path. For v1 we
  // rely on the polyline to show the route; stop pins use approximate
  // positions picked from evenly-spaced polyline points.
  if(r.polyline){
    var pts = decodePolyline(r.polyline);
    var stopCount = r.orderedJobs.length;
    for(var i = 0; i < stopCount; i++){
      var idx = i === 0 ? 0 : (i === stopCount - 1 ? pts.length - 1 : Math.floor((i / (stopCount - 1)) * (pts.length - 1)));
      var pt = pts[idx];
      if(!pt) continue;
      var marker = new google.maps.Marker({
        position: pt,
        map: _map,
        icon: { url: numberPinSvg(i + 1), scaledSize: new google.maps.Size(28, 35), anchor: new google.maps.Point(14, 35) },
        zIndex: 60,
      });
      _routeStopMarkers.push(marker);
    }
  }

  // Populate the side panel
  document.getElementById('route-panel-title').textContent = techName + ' — Today';
  document.getElementById('route-stats').innerHTML =
    '<div class="route-stat"><span class="route-stat-val">' + fmtMiles(r.totalDistanceMeters) + '</span><span class="route-stat-lbl">Total drive</span></div>' +
    '<div class="route-stat"><span class="route-stat-val">' + fmtDuration(r.totalDurationSeconds) + '</span><span class="route-stat-lbl">Drive time</span></div>' +
    '<div class="route-stat"><span class="route-stat-val">' + r.orderedJobs.length + '</span><span class="route-stat-lbl">Stops</span></div>';

  var truncEl = document.getElementById('route-truncated');
  if(r.truncated){
    truncEl.style.display = 'block';
    truncEl.textContent = 'Showing first 25 of ' + r.originalCount + ' stops. Split into two days for more.';
  } else {
    truncEl.style.display = 'none';
  }

  var legs = r.legs || [];
  var stopsHtml = r.orderedJobs.map(function(j, i){
    var prevLeg = i > 0 ? legs[i - 1] : null;
    var legLine = prevLeg
      ? '<div class="route-stop-leg">+ ' + prevLeg.durationText + ' · ' + prevLeg.distanceText + '</div>'
      : '';
    var name = j.customerName || j.title || 'Stop ' + (i + 1);
    var addr = j.address || '';
    return '<div class="route-stop">'
      + '<div class="route-stop-num">' + (i + 1) + '</div>'
      + '<div class="route-stop-body">'
        + '<div class="route-stop-name">' + name + '</div>'
        + '<div class="route-stop-addr">' + addr + '</div>'
        + legLine
      + '</div>'
    + '</div>';
  }).join('');
  document.getElementById('route-stops').innerHTML = stopsHtml;
  document.getElementById('route-panel').classList.add('open');
}
function setClockButton(on){
  _myClockedIn = !!on;
  var btn = document.getElementById('clock-btn');
  var label = document.getElementById('clock-btn-label');
  if(!btn) return;
  btn.classList.toggle('on', _myClockedIn);
  label.textContent = _myClockedIn ? 'Clock Out' : 'Clock In';
  btn.disabled = false;
}

async function toggleClock(){
  var btn = document.getElementById('clock-btn');
  if(btn) btn.disabled = true;
  try {
    if(_myClockedIn){
      await API.team.clockOut();
      stopWatch();
      setClockButton(false);
      showToast("You're clocked out");
    } else {
      await API.team.clockIn();
      setClockButton(true);
      startWatch();
      showToast("You're clocked in");
    }
    await loadLocations();
  } catch (e) {
    showToast('Could not update: ' + (e.message || 'error'));
  } finally {
    if(btn) btn.disabled = false;
  }
}

function startWatch(){
  if(!('geolocation' in navigator)){
    showToast('Your browser does not support location');
    return;
  }
  if(_watchId != null) return;
  _watchId = navigator.geolocation.watchPosition(async function(pos){
    try {
      await API.team.updateLocation({
        latitude:  pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy:  pos.coords.accuracy,
      });
    } catch (_) { /* transient — keep the watcher running */ }
  }, function(err){
    if(err.code === err.PERMISSION_DENIED){
      showToast('Location permission blocked — allow it in your browser to share');
    }
  }, { enableHighAccuracy: true, maximumAge: 10000, timeout: 15000 });
}

function stopWatch(){
  if(_watchId != null){
    try { navigator.geolocation.clearWatch(_watchId); } catch (_) {}
    _watchId = null;
  }
}
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBQ3Ki8OnOtzxnh0ODzgtMf_o8k5Hgv5mA",
    authDomain: "swft-ai26.firebaseapp.com",
    projectId: "swft-ai26",
    storageBucket: "swft-ai26.firebasestorage.app",
    messagingSenderId: "170879575187",
    appId: "1:170879575187:web:e329382b0adf9518ead966",
    measurementId: "G-B8BEW7E87V"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      try { if (auth.authStateReady) await auth.authStateReady(); } catch (_) {}
      user = auth.currentUser;
    }
    if (!user) {
      console.warn("[SWFT-REDIRECT] team-tracker onAuthStateChanged saw no user");
      window.location.href = "swft-login";
      return;
    }
    window.__swftUser = user;
    window._myUid = user.uid;

    try {
      const me = await API.user.me();
      const sub = document.getElementById('topbar-sub');
      if(sub){
        sub.textContent = (me.role === 'owner' || me.role === 'admin')
          ? 'where your crew is right now'
          : 'your live location on the map';
      }
    } catch (_) {}

    await loadMapsSdk();
    centerOnViewer();
    await loadLocations();

    // Hydrate clock-in state from my own row — if already on the clock, resume the watcher
    const mine = (_members || []).find(m => m.uid === user.uid);
    if (mine) setClockButton(!!mine.clockedIn);
    else      setClockButton(false);
    if (_myClockedIn) startWatch();

    // Refresh the map + list every 15s so admins see crew movement
    if(_pollTimer) clearInterval(_pollTimer);
    _pollTimer = setInterval(loadLocations, 15000);

    // Pause polling when the tab is hidden to save battery/requests
    document.addEventListener('visibilitychange', () => {
      if(document.hidden){
        if(_pollTimer){ clearInterval(_pollTimer); _pollTimer = null; }
      } else if(!_pollTimer){
        loadLocations();
        _pollTimer = setInterval(loadLocations, 15000);
      }
    });
  });
</script>
