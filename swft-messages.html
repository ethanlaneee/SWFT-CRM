<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SWFT — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--surface:#111111;--surface2:#181818;--border:#1f1f1f;--border2:#2c2c2c;--green:#c8f135;--white:#f0f0f0;--gray:#7a7a7a;--gray2:#444444;--blue:#4d9fff;--amber:#f5a623;--red:#ff5252;--sidebar-w:228px;}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:#0a0a0a;}
body{visibility:hidden;background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;}

.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);}
.sidebar.collapsed{transform:translateX(-100%);}
.collapse-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);flex-shrink:0;transition:all 0.14s;}
.collapse-btn:hover{background:var(--surface2);color:var(--white);}
.sidebar-toggle{position:fixed;top:14px;left:14px;z-index:9000;width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all 0.15s;opacity:0;pointer-events:none;}
.sidebar-toggle.visible{opacity:1;pointer-events:all;}
.sidebar-toggle:hover{background:var(--surface2);color:var(--white);}
.logo-wrap{padding:26px 22px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--white);line-height:1;}
.logo-mark em{color:var(--green);font-style:normal;}
.logo-sub{font-size:9.5px;color:var(--gray2);letter-spacing:1.8px;margin-top:3px;font-weight:300;}
.nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.nav-label{font-size:9.5px;letter-spacing:2.5px;color:var(--gray2);text-transform:uppercase;padding:14px 12px 5px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:400;color:var(--gray);transition:background 0.14s,color 0.14s;position:relative;user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--white);}
.nav-item.active{background:rgba(200,241,53,0.07);color:var(--green);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--green);border-radius:0 3px 3px 0;}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:0.8;}
.nav-item.active .nav-icon{opacity:1;}
.sidebar-footer{border-top:1px solid var(--border);padding:12px 10px;}
.user-tile{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:background 0.14s;}
.user-tile:hover{background:var(--surface2);}
.s-avatar{width:30px;height:30px;border-radius:50%;background:var(--green);color:#0a0a0a;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-name{font-size:12px;font-weight:500;color:var(--white);}
.user-role{font-size:10.5px;color:var(--gray2);margin-top:1px;}

.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left 0.28s cubic-bezier(0.22,1,0.36,1);}
.main.expanded{margin-left:0!important;}
.main.expanded .topbar{padding-left:56px;}
.topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;background:rgba(10,10,10,0.9);backdrop-filter:blur(14px);z-index:100;}
.topbar-page{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2.5px;color:var(--white);}
.topbar-slash{color:var(--border2);font-family:'JetBrains Mono',monospace;font-size:16px;}
.topbar-sub{font-size:12px;color:var(--gray);font-style:italic;font-weight:300;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.btn-primary{display:flex;align-items:center;gap:7px;background:var(--green);color:#0a0a0a;font-weight:700;font-size:12.5px;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;transition:all 0.18s;}
.btn-primary:hover{background:#d5ff40;transform:translateY(-1px);}

.page-body{flex:1;padding:28px;display:flex;flex-direction:column;gap:18px;}

/* Compose */
.compose-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;display:none;flex-direction:column;gap:14px;}
.compose-panel.open{display:flex;}
.compose-field{display:flex;flex-direction:column;gap:4px;}
.compose-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--white);font-weight:600;}
.compose-input{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.15s;width:100%;}
.compose-input:focus{border-color:var(--green);}
.compose-textarea{min-height:120px;resize:vertical;line-height:1.5;}
.compose-footer{display:flex;gap:10px;justify-content:flex-end;}
.compose-btn{padding:9px 18px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--gray);font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:all 0.14s;}
.compose-btn:hover{background:var(--surface2);color:var(--white);}
.compose-btn.primary{background:var(--green);color:#0a0a0a;font-weight:700;border-color:var(--green);}
.compose-btn.primary:hover{background:#d5ff40;}

/* Message list */
.msg-list{display:flex;flex-direction:column;gap:8px;}
.msg-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;cursor:pointer;transition:all 0.14s;display:flex;align-items:flex-start;gap:14px;}
.msg-item:hover{border-color:var(--border2);background:var(--surface2);}
.msg-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.msg-body{flex:1;min-width:0;}
.msg-to{font-size:13px;font-weight:500;color:var(--white);}
.msg-subject{font-size:12.5px;color:var(--gray);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.msg-preview{font-size:11.5px;color:var(--gray2);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.msg-meta{flex-shrink:0;text-align:right;}
.msg-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gray2);}
.msg-status{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:5px;margin-top:4px;display:inline-block;}
.msg-status.sent{background:rgba(200,241,53,0.1);color:var(--green);}

/* Type toggle tabs */
.type-tabs{display:flex;gap:4px;margin-bottom:8px;}
.type-tab{font-size:11.5px;font-weight:500;padding:7px 16px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);color:var(--gray);transition:all 0.14s;user-select:none;}
.type-tab:hover{color:var(--white);border-color:var(--gray2);}
.type-tab.active{background:rgba(200,241,53,0.1);color:var(--green);border-color:rgba(200,241,53,0.25);}

/* Filter tabs */
.filter-tabs{display:flex;gap:4px;}
.filter-tab{font-size:11px;font-weight:500;padding:6px 12px;border-radius:7px;cursor:pointer;border:1px solid var(--border2);color:var(--gray);transition:all 0.14s;user-select:none;}
.filter-tab:hover{color:var(--white);border-color:var(--gray2);}
.filter-tab.active{background:rgba(200,241,53,0.1);color:var(--green);border-color:rgba(200,241,53,0.25);}

/* Attachment chip */
.attach-dropdown{position:relative;}
.attach-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--gray);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.14s;}
.attach-btn:hover{background:var(--surface2);color:var(--white);}
.attach-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(200,241,53,0.08);border:1px solid rgba(200,241,53,0.2);border-radius:7px;padding:5px 10px;font-size:11.5px;color:var(--green);margin-top:6px;}
.attach-chip .remove{cursor:pointer;opacity:0.6;font-size:14px;}
.attach-chip .remove:hover{opacity:1;}
.attach-list{position:absolute;bottom:100%;left:0;margin-bottom:6px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;min-width:280px;max-height:220px;overflow-y:auto;z-index:10;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.attach-list.open{display:block;}
.attach-list-header{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray2);padding:10px 12px 4px;font-weight:600;}
.attach-option{padding:9px 12px;font-size:12.5px;color:var(--white);cursor:pointer;transition:background 0.1s;display:flex;justify-content:space-between;align-items:center;}
.attach-option:hover{background:var(--surface2);}
.attach-option .doc-total{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gray);}

/* Message type badge */
.msg-type-badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;letter-spacing:0.3px;margin-left:6px;}
.msg-type-badge.email{background:rgba(77,159,255,0.1);color:var(--blue);}
.msg-type-badge.sms{background:rgba(200,241,53,0.1);color:var(--green);}
.msg-attach-badge{font-size:9.5px;color:var(--amber);margin-top:2px;}

.empty-state{text-align:center;padding:40px;color:var(--gray);font-size:13px;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px 20px;font-size:13px;color:var(--white);display:flex;align-items:center;gap:8px;z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>

<script>
// ── State ──
var _msgType = 'email';
var _msgFilter = 'all';
var _allMessages = [];
var _attachedDoc = null; // { type: 'quote'|'invoice', id, label }

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('collapsed');
  document.getElementById('main').classList.toggle('expanded');
  document.getElementById('sidebar-toggle').classList.toggle('visible');
}

var _tt;
function showToast(msg){
  var t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt=setTimeout(function(){t.classList.remove('show');},2500);
}

// ── Message type toggle (Email / SMS) ──
function setMsgType(type) {
  _msgType = type;
  document.querySelectorAll('.type-tab').forEach(function(t) {
    t.classList.toggle('active', t.textContent.toLowerCase() === type);
  });
  document.getElementById('email-field').style.display = type === 'email' ? '' : 'none';
  document.getElementById('phone-field').style.display = type === 'sms' ? '' : 'none';
  document.getElementById('subject-field').style.display = type === 'email' ? '' : 'none';
  document.getElementById('attach-area').style.display = type === 'email' ? '' : 'none';
  if (type === 'sms') { _attachedDoc = null; renderAttachChip(); }
  fillCustomerField();
}

// ── Message list filter (All / Email / SMS) ──
function setMsgFilter(filter) {
  _msgFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(function(t) {
    t.classList.toggle('active', t.textContent.toLowerCase() === filter);
  });
  renderMessages();
}

// ── Compose ──
function toggleCompose() {
  var panel = document.getElementById('compose-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    loadCustomersForCompose();
    loadAttachDocs();
  }
}

async function loadCustomersForCompose() {
  try {
    var customers = await API.customers.list();
    var select = document.getElementById('msg-customer');
    select.innerHTML = '<option value="">Select a customer...</option>';
    customers.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name || 'Unnamed';
      opt.dataset.email = c.email || '';
      opt.dataset.phone = c.phone || '';
      opt.dataset.name = c.name || '';
      select.appendChild(opt);
    });
    window._msgCustomers = customers;
  } catch(e) {}
}

function fillCustomerField() {
  var select = document.getElementById('msg-customer');
  var opt = select.options[select.selectedIndex];
  if (!opt) return;
  if (_msgType === 'email' && opt.dataset.email) {
    document.getElementById('msg-to').value = opt.dataset.email;
  } else if (_msgType === 'sms' && opt.dataset.phone) {
    document.getElementById('msg-phone').value = opt.dataset.phone;
  }
}

// ── Attachments ──
async function loadAttachDocs() {
  try {
    var quotes = await API.quotes.list();
    var invoices = await API.invoices.list();
    var list = document.getElementById('attach-list');
    var html = '';

    if (quotes.length) {
      html += '<div class="attach-list-header">Quotes</div>';
      quotes.forEach(function(q) {
        var label = (q.customerName || 'Quote') + ' — ' + (q.service || '');
        html += '<div class="attach-option" onclick="selectAttachment(\'quote\',\'' + q.id + '\',\'' + label.replace(/'/g, "\\'") + '\')">' +
          '<span>' + label + '</span>' +
          '<span class="doc-total">$' + Number(q.total || 0).toFixed(2) + '</span></div>';
      });
    }
    if (invoices.length) {
      html += '<div class="attach-list-header">Invoices</div>';
      invoices.forEach(function(inv) {
        var label = (inv.customerName || 'Invoice') + ' — ' + (inv.service || '');
        html += '<div class="attach-option" onclick="selectAttachment(\'invoice\',\'' + inv.id + '\',\'' + label.replace(/'/g, "\\'") + '\')">' +
          '<span>' + label + '</span>' +
          '<span class="doc-total">$' + Number(inv.total || 0).toFixed(2) + '</span></div>';
      });
    }
    if (!html) html = '<div style="padding:16px;text-align:center;color:var(--gray);font-size:12px;">No quotes or invoices yet</div>';
    list.innerHTML = html;
  } catch(e) {}
}

function toggleAttachList() {
  document.getElementById('attach-list').classList.toggle('open');
}

function selectAttachment(docType, docId, label) {
  _attachedDoc = { type: docType, id: docId, label: label };
  document.getElementById('attach-list').classList.remove('open');
  renderAttachChip();
}

function removeAttachment() {
  _attachedDoc = null;
  renderAttachChip();
}

function renderAttachChip() {
  var area = document.getElementById('attach-chip-area');
  if (!_attachedDoc) { area.innerHTML = ''; return; }
  var icon = _attachedDoc.type === 'quote' ? '📄' : '🧾';
  area.innerHTML = '<div class="attach-chip">' + icon + ' ' + _attachedDoc.label +
    '<span class="remove" onclick="removeAttachment()">&times;</span></div>';
}

// Close attach list on outside click
document.addEventListener('click', function(e) {
  var dd = document.getElementById('attach-area');
  if (dd && !dd.contains(e.target)) {
    document.getElementById('attach-list').classList.remove('open');
  }
});

// ── Send message ──
async function sendMessage() {
  var custSelect = document.getElementById('msg-customer');
  var customerName = custSelect.options[custSelect.selectedIndex] ? custSelect.options[custSelect.selectedIndex].textContent : '';
  if (customerName === 'Select a customer...') customerName = '';
  var customerId = custSelect.value;
  var body = document.getElementById('msg-body').value.trim();

  if (_msgType === 'sms') {
    var phone = document.getElementById('msg-phone').value.trim();
    if (!phone) { showToast('Enter a phone number'); return; }
    if (!body) { showToast('Enter a message'); return; }

    try {
      await API.messages.send({ to: phone, body: body, type: 'sms', customerId: customerId, customerName: customerName });
      showToast('SMS sent to ' + phone);
      resetCompose();
      loadMessages();
    } catch(e) { showToast('Error: ' + e.message); }
  } else {
    var to = document.getElementById('msg-to').value.trim();
    var subject = document.getElementById('msg-subject').value.trim();
    if (!to) { showToast('Enter an email address'); return; }
    if (!subject) { showToast('Enter a subject'); return; }

    var payload = { to: to, subject: subject, body: body, type: 'email', customerId: customerId, customerName: customerName };
    if (_attachedDoc) {
      if (_attachedDoc.type === 'quote') payload.quoteId = _attachedDoc.id;
      else payload.invoiceId = _attachedDoc.id;
    }

    try {
      await API.messages.send(payload);
      showToast('Email sent to ' + to);
      resetCompose();
      loadMessages();
    } catch(e) { showToast('Error: ' + e.message); }
  }
}

function resetCompose() {
  document.getElementById('msg-to').value = '';
  document.getElementById('msg-phone').value = '';
  document.getElementById('msg-subject').value = '';
  document.getElementById('msg-body').value = '';
  document.getElementById('msg-customer').selectedIndex = 0;
  _attachedDoc = null;
  renderAttachChip();
  toggleCompose();
}

// ── Load & render messages ──
async function loadMessages() {
  try {
    var messages = await API.messages.list();
    _allMessages = messages;
    document.getElementById('msg-count').textContent = messages.length + ' sent';
    renderMessages();
  } catch(e) {}
}

function renderMessages() {
  var list = document.getElementById('msg-list');
  var filtered = _allMessages;
  if (_msgFilter !== 'all') {
    filtered = _allMessages.filter(function(m) { return (m.type || 'email') === _msgFilter; });
  }

  if (!filtered.length) {
    var emptyMsg = _msgFilter === 'all'
      ? 'No messages yet. Click New Message to get started.'
      : 'No ' + _msgFilter.toUpperCase() + ' messages yet.';
    list.innerHTML = '<div class="empty-state">' + emptyMsg + '</div>';
    return;
  }

  list.innerHTML = filtered.map(function(m) {
    var isSms = (m.type || 'email') === 'sms';
    var time = m.sentAt ? new Date(m.sentAt).toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '—';

    var icon = isSms
      ? '<div class="msg-icon" style="background:rgba(200,241,53,0.1);"><svg width="18" height="18" fill="none" stroke="#c8f135" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-width="1.8"/></svg></div>'
      : '<div class="msg-icon" style="background:rgba(77,159,255,0.1);"><svg width="18" height="18" fill="none" stroke="#4d9fff" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke-width="1.8"/><polyline points="22,6 12,13 2,6" stroke-width="1.8"/></svg></div>';

    var typeBadge = '<span class="msg-type-badge ' + (isSms ? 'sms' : 'email') + '">' + (isSms ? 'SMS' : 'Email') + '</span>';

    var subjectLine = isSms ? '' : '<div class="msg-subject">' + (m.subject || '(no subject)') + '</div>';
    var attachBadge = m.attachedDocType ? '<div class="msg-attach-badge">📎 ' + (m.attachedDocType === 'quote' ? 'Quote' : 'Invoice') + ' attached</div>' : '';

    return '<div class="msg-item">' +
      icon +
      '<div class="msg-body">' +
        '<div class="msg-to">' + (m.customerName || m.to) + typeBadge + '</div>' +
        subjectLine +
        '<div class="msg-preview">' + (m.body || '').substring(0, 120).replace(/<[^>]*>/g,'') + '</div>' +
        attachBadge +
      '</div>' +
      '<div class="msg-meta">' +
        '<div class="msg-time">' + time + '</div>' +
        '<div class="msg-status sent">Sent</div>' +
      '</div>' +
    '</div>';
  }).join('');
}
</script>
