<title>Reviews — SWFT</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--surface:#111111;--surface2:#181818;--border:#1f1f1f;--border2:#2c2c2c;--green:#c8f135;--white:#f0f0f0;--gray:#7a7a7a;--gray2:#444444;--blue:#4d9fff;--amber:#f5a623;--red:#ff5252;--purple:#b388ff;--sidebar-w:228px;}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#0a0a0a;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);}
.sidebar.collapsed{transform:translateX(-100%);}
.collapse-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);flex-shrink:0;transition:all 0.14s;}
.collapse-btn:hover{background:var(--surface2);color:var(--white);}
.sidebar-toggle{position:fixed;top:14px;left:14px;z-index:9000;width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all 0.15s;opacity:0;pointer-events:none;}
.sidebar-toggle.visible{opacity:1;pointer-events:all;}
.sidebar-toggle:hover{background:var(--surface2);color:var(--white);}
.logo-wrap{padding:26px 22px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo-mark{font-family:'Space Mono',monospace;font-weight:700;font-size:26px;letter-spacing:4px;text-transform:uppercase;color:var(--white);line-height:1;}
.logo-mark em{color:var(--green);font-style:normal;}
.logo-sub{font-size:9.5px;color:var(--gray2);letter-spacing:1.8px;margin-top:3px;font-weight:300;}
.nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.nav-label{font-size:9.5px;letter-spacing:2.5px;color:var(--gray2);text-transform:uppercase;padding:14px 12px 5px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:400;color:var(--gray);transition:background 0.14s,color 0.14s;position:relative;user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--white);}
.nav-item.active{background:rgba(200,241,53,0.07);color:var(--green);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--green);border-radius:0 3px 3px 0;}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:0.8;}
.nav-item.active .nav-icon{opacity:1;}
.sidebar-footer{border-top:1px solid var(--border);padding:12px 10px;}
.user-tile{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:background 0.14s;}
.user-tile:hover{background:var(--surface2);}
.s-avatar{width:30px;height:30px;border-radius:50%;background:var(--green);color:#0a0a0a;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-name{font-size:12px;font-weight:500;color:var(--white);}
.user-role{font-size:10.5px;color:var(--gray2);margin-top:1px;}
.main{margin-left:var(--sidebar-w);flex:1;padding:32px 36px;max-width:860px;transition:margin-left 0.28s cubic-bezier(0.22,1,0.36,1);}
.main.expanded{margin-left:0!important;}

h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--white);margin-bottom:4px;}
.subtitle{color:var(--gray);font-size:13px;margin-bottom:28px;}

/* Location selector */
.selector-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;}
.selector-field{display:flex;flex-direction:column;gap:5px;}
.selector-field label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);font-weight:600;}
.selector-input{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:9px 13px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;min-width:200px;transition:border-color 0.15s;}
.selector-input:focus{border-color:var(--green);}
.btn-load{background:var(--green);color:#0a0a0a;font-weight:700;font-size:13px;padding:9px 22px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
.btn-load:hover{background:#d5ff40;}
.btn-load:disabled{opacity:0.4;cursor:not-allowed;}

/* Stats bar */
.stats-bar{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 22px;display:flex;align-items:center;gap:14px;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--white);line-height:1;}
.stat-stars{font-size:18px;color:var(--amber);letter-spacing:2px;}
.stat-label{font-size:11.5px;color:var(--gray);}

/* Filter tabs */
.filter-row{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--gray);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.14s;}
.filter-btn:hover{background:var(--surface2);color:var(--white);}
.filter-btn.active{background:var(--surface2);color:var(--white);border-color:var(--border);}

/* Review cards */
.reviews-list{display:flex;flex-direction:column;gap:14px;}
.review-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:20px;}
.review-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.reviewer-avatar{width:38px;height:38px;border-radius:50%;background:var(--green);color:#0a0a0a;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.reviewer-name{font-size:14px;font-weight:600;color:var(--white);}
.review-meta{display:flex;align-items:center;gap:8px;margin-top:2px;}
.review-stars{color:var(--amber);font-size:13px;letter-spacing:1px;}
.review-date{font-size:11px;color:var(--gray2);}
.review-text{font-size:13px;color:var(--gray);line-height:1.7;margin-bottom:14px;}
.review-text:empty{display:none;}

/* Reply */
.reply-box{background:var(--surface2);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:12px;}
.reply-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--green);margin-bottom:5px;font-weight:600;}
.reply-text{font-size:12.5px;color:var(--white);line-height:1.6;}
.reply-actions{display:flex;gap:8px;margin-top:8px;}
.btn-sm{padding:5px 13px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--gray);font-size:11.5px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.14s;}
.btn-sm:hover{background:var(--surface);color:var(--white);}
.btn-sm.danger:hover{color:var(--red);border-color:rgba(255,82,82,0.3);}

.reply-form{display:none;margin-bottom:12px;}
.reply-form.open{display:block;}
.reply-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:vertical;min-height:80px;transition:border-color 0.15s;}
.reply-textarea:focus{border-color:var(--green);}
.reply-form-actions{display:flex;gap:8px;margin-top:8px;}
.btn-reply-submit{background:var(--green);color:#0a0a0a;font-weight:700;font-size:12px;padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-reply-submit:hover{background:#d5ff40;}
.btn-reply-cancel{padding:7px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--gray);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}

.review-footer{display:flex;gap:8px;}
.btn-reply{padding:6px 15px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--gray);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.14s;}
.btn-reply:hover{background:var(--surface2);color:var(--white);}

/* States */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-icon{font-size:40px;margin-bottom:14px;}
.empty-title{font-size:15px;font-weight:600;color:var(--white);margin-bottom:6px;}
.empty-desc{font-size:13px;line-height:1.6;}
.connect-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;text-align:center;max-width:480px;margin:60px auto;}
.connect-card h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:10px;}
.connect-card p{font-size:13px;color:var(--gray);margin-bottom:22px;line-height:1.7;}
.btn-connect{display:inline-block;background:var(--green);color:#0a0a0a;font-weight:700;font-size:13px;padding:10px 24px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;transition:all 0.15s;}
.btn-connect:hover{background:#d5ff40;}

.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:60px auto;}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px 20px;font-size:13px;color:var(--white);display:flex;align-items:center;gap:8px;z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.toast-dot.red{background:var(--red);}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.swft-modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:center;justify-content:center;}
.swft-modal-overlay.open{display:flex;}
.swft-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:420px;width:calc(100% - 40px);box-shadow:0 24px 64px rgba(0,0,0,0.5);animation:fadeUp 0.2s ease both;}
.swft-modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--white);margin-bottom:12px;}
.swft-modal-body{font-size:13px;line-height:1.6;color:var(--gray);margin-bottom:24px;white-space:pre-line;}
.swft-modal-actions{display:flex;justify-content:flex-end;gap:10px;}
.swft-modal-btn{padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid;transition:all 0.14s;}
.swft-modal-btn.cancel{background:transparent;border-color:var(--border2);color:var(--gray);}
.swft-modal-btn.cancel:hover{background:var(--surface2);color:var(--white);}
.swft-modal-btn.confirm{background:var(--green);border-color:var(--green);color:#0a0a0a;}
.swft-modal-btn.confirm:hover{box-shadow:0 0 20px rgba(200,241,53,0.2);}
.swft-modal-btn.danger{background:rgba(255,82,82,0.12);border-color:rgba(255,82,82,0.25);color:var(--red);}
.swft-modal-btn.danger:hover{background:rgba(255,82,82,0.2);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>

  appId: "1:170879575187:web:e329382b0adf9518ead966",
  measurementId: "G-B8BEW7E87V"
};
initializeApp(firebaseConfig);

let _allReviews = [];
let _accountId = '';
let _locationId = '';
let _activeFilter = 'all';

/* ── SWFT CONFIRM MODAL ── */
window.swftConfirm = function(title, message, opts = {}) {
  return new Promise(resolve => {
    const overlay = document.getElementById('swftModalOverlay');
    const titleEl = document.getElementById('swftModalTitle');
    const bodyEl = document.getElementById('swftModalBody');
    const cancelBtn = document.getElementById('swftModalCancel');
    const confirmBtn = document.getElementById('swftModalConfirm');
    titleEl.textContent = title;
    bodyEl.textContent = message;
    confirmBtn.className = 'swft-modal-btn ' + (opts.danger ? 'danger' : 'confirm');
    confirmBtn.textContent = opts.confirmLabel || (opts.danger ? 'Delete' : 'Confirm');
    cancelBtn.textContent = opts.cancelLabel || 'Cancel';
    function cleanup(result) {
      overlay.classList.remove('open');
      cancelBtn.removeEventListener('click', onCancel);
      confirmBtn.removeEventListener('click', onConfirm);
      overlay.removeEventListener('click', onOverlay);
      resolve(result);
    }
    function onCancel() { cleanup(false); }
    function onConfirm() { cleanup(true); }
    function onOverlay(e) { if (e.target === overlay) cleanup(false); }
    cancelBtn.addEventListener('click', onCancel);
    confirmBtn.addEventListener('click', onConfirm);
    overlay.addEventListener('click', onOverlay);
    overlay.classList.add('open');
  });
};

async function init() {
  try {
    const user = await requireAuth();
    loadUser && loadUser();
  } catch(e) { return; }

  // Try to load accounts
  try {
    const data = await API.googleBusiness.accounts();
    renderPage(data.accounts || []);
  } catch(e) {
    if (e.message && e.message.includes('not connected')) {
      showNotConnected();
    } else {
      showNotConnected();
    }
  }
}

function showNotConnected() {
  document.getElementById('root').innerHTML = `
    <div class="connect-card">
      <div style="font-size:40px;margin-bottom:14px;">⭐</div>
      <h2>Google Business Profile</h2>
      <p>Connect your Google Business Profile to view and respond to your Google reviews directly in SWFT.</p>
      <a class="btn-connect" href="swft-settings?tab=integrations">Connect in Settings</a>
    </div>`;
}

function renderPage(accounts) {
  const root = document.getElementById('root');
  const accountOptions = accounts.length
    ? accounts.map(a => `<option value="${a.name.split('/')[1]}">${a.accountName || a.name}</option>`).join('')
    : '<option value="">No accounts found</option>';

  root.innerHTML = `
    <div class="selector-row">
      <div class="selector-field">
        <label>Business Account</label>
        <select class="selector-input" id="sel-account" style="min-width:220px;">
          ${accountOptions}
        </select>
      </div>
      <div class="selector-field">
        <label>Location ID</label>
        <input class="selector-input" id="inp-location" placeholder="e.g. 12345678901234567" style="min-width:200px;"/>
      </div>
      <div class="selector-field" style="justify-content:flex-end;">
        <button class="btn-load" id="btn-load" onclick="loadReviews()">Load Reviews</button>
      </div>
    </div>
    <div style="font-size:11.5px;color:var(--gray2);margin-top:-16px;margin-bottom:20px;">
      Find your Location ID in <a href="https://business.google.com" target="_blank" style="color:var(--gray);text-decoration:underline;">Google Business Manager</a> → Manage Location → Location ID in the URL.
    </div>
    <div id="reviews-area"></div>`;

  // Auto-fill accountId from first account
  if (accounts.length) {
    _accountId = accounts[0].name.split('/')[1];
  }
  document.getElementById('sel-account').addEventListener('change', e => {
    _accountId = e.target.value;
  });
}

window.loadReviews = async function() {
  _accountId = document.getElementById('sel-account')?.value || _accountId;
  _locationId = document.getElementById('inp-location')?.value?.trim() || '';
  if (!_locationId) { toast('Enter a Location ID', true); return; }

  const btn = document.getElementById('btn-load');
  btn.disabled = true; btn.textContent = 'Loading...';

  try {
    const data = await API.googleBusiness.reviews(_accountId, _locationId);
    _allReviews = data.reviews || [];
    renderReviews(_allReviews, data.averageRating);
  } catch(e) {
    document.getElementById('reviews-area').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load reviews</div><div class="empty-desc">${e.message}</div></div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Load Reviews';
  }
};

function renderReviews(reviews, avgRating) {
  const area = document.getElementById('reviews-area');

  // Stats
  const avg = avgRating ? parseFloat(avgRating).toFixed(1) : (reviews.length ? (reviews.reduce((s,r) => s + starNum(r.starRating), 0) / reviews.length).toFixed(1) : '—');
  const stars = avg !== '—' ? renderStars(parseFloat(avg)) : '';
  area.innerHTML = `
    <div class="stats-bar">
      <div class="stat-card">
        <div>
          <div class="stat-num">${avg}</div>
          <div class="stat-stars">${stars}</div>
        </div>
        <div class="stat-label">Average Rating</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${reviews.length}</div>
        <div style="margin-top:4px;"><div class="stat-label">Total Reviews</div></div>
      </div>
    </div>
    <div class="filter-row">
      <button class="filter-btn ${_activeFilter==='all'?'active':''}" onclick="applyFilter('all',this)">All</button>
      ${[5,4,3,2,1].map(n=>`<button class="filter-btn ${_activeFilter===String(n)?'active':''}" onclick="applyFilter('${n}',this)">${'★'.repeat(n)} ${n}★</button>`).join('')}
    </div>
    <div class="reviews-list" id="reviews-list"></div>`;

  renderList(reviews);
}

function renderList(reviews) {
  const filtered = _activeFilter === 'all' ? reviews : reviews.filter(r => starNum(r.starRating) === parseInt(_activeFilter));
  const list = document.getElementById('reviews-list');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">No reviews found</div><div class="empty-desc">No reviews match this filter.</div></div>`;
    return;
  }

  list.innerHTML = filtered.map((r, i) => {
    const name = r.reviewer?.displayName || 'Anonymous';
    const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const num = starNum(r.starRating);
    const starsHtml = '★'.repeat(num) + '☆'.repeat(5-num);
    const date = r.createTime ? new Date(r.createTime).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    const text = r.comment || '';
    const reviewId = r.reviewId || r.name?.split('/').pop() || i;
    const hasReply = !!r.reviewReply;
    const replyText = r.reviewReply?.comment || '';

    return `<div class="review-card" id="rc-${reviewId}">
      <div class="review-header">
        <div class="reviewer-avatar">${initials}</div>
        <div>
          <div class="reviewer-name">${esc(name)}</div>
          <div class="review-meta">
            <span class="review-stars">${starsHtml}</span>
            <span class="review-date">${date}</span>
          </div>
        </div>
      </div>
      ${text ? `<div class="review-text">${esc(text)}</div>` : ''}
      ${hasReply ? `
        <div class="reply-box" id="reply-box-${reviewId}">
          <div class="reply-label">Your Reply</div>
          <div class="reply-text" id="reply-text-${reviewId}">${esc(replyText)}</div>
          <div class="reply-actions">
            <button class="btn-sm" onclick="openEdit('${reviewId}','${esc(replyText.replace(/'/g,"\\'"))}')">Edit</button>
            <button class="btn-sm danger" onclick="deleteReply('${reviewId}')">Delete</button>
          </div>
        </div>` : ''}
      <div class="reply-form" id="reply-form-${reviewId}">
        <textarea class="reply-textarea" id="reply-ta-${reviewId}" placeholder="Write a public reply..."></textarea>
        <div class="reply-form-actions">
          <button class="btn-reply-submit" onclick="submitReply('${reviewId}')">Post Reply</button>
          <button class="btn-reply-cancel" onclick="closeForm('${reviewId}')">Cancel</button>
        </div>
      </div>
      <div class="review-footer" id="footer-${reviewId}">
        ${!hasReply ? `<button class="btn-reply" onclick="openForm('${reviewId}')">Reply</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

window.applyFilter = function(val, btn) {
  _activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList(_allReviews);
};

window.openForm = function(reviewId) {
  document.getElementById(`reply-form-${reviewId}`).classList.add('open');
  document.getElementById(`reply-ta-${reviewId}`).focus();
};
window.closeForm = function(reviewId) {
  document.getElementById(`reply-form-${reviewId}`).classList.remove('open');
};
window.openEdit = function(reviewId, existing) {
  const form = document.getElementById(`reply-form-${reviewId}`);
  form.classList.add('open');
  document.getElementById(`reply-ta-${reviewId}`).value = existing;
};

window.submitReply = async function(reviewId) {
  const comment = document.getElementById(`reply-ta-${reviewId}`).value.trim();
  if (!comment) { toast('Reply cannot be empty', true); return; }
  try {
    await API.googleBusiness.reply(reviewId, _accountId, _locationId, comment);
    toast('Reply posted');
    // Update local data and re-render card
    const r = _allReviews.find(rv => (rv.reviewId || rv.name?.split('/').pop()) === reviewId);
    if (r) r.reviewReply = { comment };
    closeForm(reviewId);
    const box = document.getElementById(`reply-box-${reviewId}`);
    const footer = document.getElementById(`footer-${reviewId}`);
    if (box) {
      document.getElementById(`reply-text-${reviewId}`).textContent = comment;
    } else {
      const card = document.getElementById(`rc-${reviewId}`);
      const form = document.getElementById(`reply-form-${reviewId}`);
      const newBox = document.createElement('div');
      newBox.className = 'reply-box';
      newBox.id = `reply-box-${reviewId}`;
      newBox.innerHTML = `<div class="reply-label">Your Reply</div><div class="reply-text" id="reply-text-${reviewId}">${esc(comment)}</div><div class="reply-actions"><button class="btn-sm" onclick="openEdit('${reviewId}','${comment.replace(/'/g,"\\'")}')">Edit</button><button class="btn-sm danger" onclick="deleteReply('${reviewId}')">Delete</button></div>`;
      card.insertBefore(newBox, form);
      if (footer) footer.innerHTML = '';
    }
  } catch(e) { toast(e.message || 'Failed to post reply', true); }
};

window.deleteReply = async function(reviewId) {
  if (!await swftConfirm('Delete Reply', 'Delete your reply? This cannot be undone.', { danger: true })) return;
  try {
    await API.googleBusiness.deleteReply(reviewId, _accountId, _locationId);
    toast('Reply deleted');
    const box = document.getElementById(`reply-box-${reviewId}`);
    const footer = document.getElementById(`footer-${reviewId}`);
    if (box) box.remove();
    if (footer) footer.innerHTML = `<button class="btn-reply" onclick="openForm('${reviewId}')">Reply</button>`;
    const r = _allReviews.find(rv => (rv.reviewId || rv.name?.split('/').pop()) === reviewId);
    if (r) delete r.reviewReply;
  } catch(e) { toast(e.message || 'Failed to delete reply', true); }
};

function starNum(s) {
  const map = {ONE:1,TWO:2,THREE:3,FOUR:4,FIVE:5};
  return map[s] || parseInt(s) || 0;
}
function renderStars(n) {
  const full = Math.round(n);
  return '★'.repeat(full) + '☆'.repeat(5-full);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer;
window.toast = function(msg, err) {
  const el = document.getElementById('toast');
  const dot = document.getElementById('toast-dot');
  document.getElementById('toast-msg').textContent = msg;
  dot.className = 'toast-dot' + (err ? ' red' : '');
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
};

init();
</script>
