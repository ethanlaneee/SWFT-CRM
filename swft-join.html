<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<title>SWFT — Join Your Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
:root{--bg:#0a0a0a;--surface:#111111;--surface2:#181818;--border:#1f1f1f;--border2:#2c2c2c;--green:#c8f135;--white:#f0f0f0;--gray:#7a7a7a;--gray2:#444444;--red:#ff5252;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:18px;width:420px;max-width:100%;padding:36px 32px 32px;animation:fadeUp 0.4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:28px;letter-spacing:4px;text-transform:uppercase;margin-bottom:2px;}
.logo em{color:var(--green);font-style:normal;}
.logo-sub{font-size:10px;color:var(--gray2);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:24px;}
.team-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(200,241,53,0.08);border:1px solid rgba(200,241,53,0.2);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;color:var(--green);letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;}
.invite-box{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:16px 18px;margin-bottom:24px;}
.invite-box-label{font-size:10px;color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.invite-box-org{font-size:16px;font-weight:600;color:var(--white);margin-bottom:2px;}
.invite-box-role{font-size:12px;color:var(--green);font-weight:600;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10.5px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:11px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;}
.field input:focus{border-color:rgba(200,241,53,0.5);}
.field input:disabled{opacity:0.5;cursor:not-allowed;}
.btn{width:100%;padding:13px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.18s;border:none;margin-top:6px;}
.btn-green{background:var(--green);color:#0a0a0a;}
.btn-green:hover{background:#d5ff40;transform:translateY(-1px);box-shadow:0 4px 18px rgba(200,241,53,0.22);}
.btn-green:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--gray);margin-top:8px;}
.btn-outline:hover{background:var(--surface2);color:var(--white);}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divider span{font-size:11px;color:var(--gray2);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2);}
.msg-error{color:var(--red);font-size:13px;margin-top:12px;line-height:1.5;}
.msg-success{color:var(--green);font-size:13px;margin-top:12px;line-height:1.5;}
.msg-loading{color:var(--gray);font-size:13px;margin-top:12px;}
.already-signed-in{background:rgba(200,241,53,0.05);border:1px solid rgba(200,241,53,0.15);border-radius:9px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--gray);}
.already-signed-in strong{color:var(--white);}
</style>

</head>
<body>

<div class="card" id="card">
  <div class="logo">SWFT<em>.</em></div>
  <div class="logo-sub">Teams</div>
  <div id="content"><p class="msg-loading">Validating invite...</p></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBQ3Ki8OnOtzxnh0ODzgtMf_o8k5Hgv5mA",
    authDomain: "swft-ai26.firebaseapp.com",
    projectId: "swft-ai26",
    storageBucket: "swft-ai26.firebasestorage.app",
    messagingSenderId: "170879575187",
    appId: "1:170879575187:web:e329382b0adf9518ead966",
    measurementId: "G-B8BEW7E87V"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const content = document.getElementById('content');

  if (!token) {
    content.innerHTML = '<p class="msg-error">Invalid invite link. Ask your team admin for a new one.</p>';
  } else {
    validateInvite();
  }

  let invite = null;

  async function validateInvite() {
    try {
      const res = await fetch('/api/team/invite/' + token);
      const data = await res.json();

      if (!data.valid) {
        content.innerHTML = '<p class="msg-error">' + (data.error || 'Invalid or expired invite.') + '</p><button class="btn btn-outline" style="margin-top:16px;" onclick="window.location.href=\'swft-login\'">Go to Login</button>';
        return;
      }

      invite = data;
      onAuthStateChanged(auth, (user) => renderJoinUI(user));
    } catch(e) {
      content.innerHTML = '<p class="msg-error">Could not validate invite. Please try again.</p>';
    }
  }

  function renderJoinUI(currentUser) {
    const roleLabel = (invite.role || 'technician');
    const roleCapped = roleLabel[0].toUpperCase() + roleLabel.slice(1);

    const inviteBox = `
      <div class="team-badge">
        <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2"/><circle cx="9" cy="7" r="4" stroke-width="2"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke-width="2"/></svg>
        Team Invite
      </div>
      <div class="invite-box">
        <div class="invite-box-label">You're invited to join</div>
        <div class="invite-box-org">${esc(invite.orgName || 'Your Team')}</div>
        <div class="invite-box-role">As: ${esc(roleCapped)}</div>
      </div>
    `;

    if (currentUser) {
      // User is already logged in — just let them join
      content.innerHTML = inviteBox + `
        <div class="already-signed-in">
          Signed in as <strong>${esc(currentUser.email)}</strong>
        </div>
        <button class="btn btn-green" id="join-btn">Accept & Join Team</button>
        <button class="btn btn-outline" id="switch-btn">Use a different account</button>
        <div id="join-msg"></div>
      `;
      document.getElementById('join-btn').addEventListener('click', () => acceptInvite(currentUser));
      document.getElementById('switch-btn').addEventListener('click', () => signOut(auth).then(() => renderJoinUI(null)));
      return;
    }

    // Not logged in — show signup form (primary) and sign-in toggle (secondary)
    content.innerHTML = inviteBox + `
      <div id="form-area">
        <div style="display:flex;gap:10px;">
          <div class="field" style="flex:1;">
            <label>First Name</label>
            <input type="text" id="j-firstname" placeholder="First" autocomplete="given-name"/>
          </div>
          <div class="field" style="flex:1;">
            <label>Last Name</label>
            <input type="text" id="j-lastname" placeholder="Last" autocomplete="family-name"/>
          </div>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="j-email" value="${esc(invite.email || '')}" ${invite.email ? 'readonly' : ''} placeholder="you@email.com"/>
        </div>
        <div class="field">
          <label>Create a Password</label>
          <input type="password" id="j-pass" placeholder="At least 6 characters" autocomplete="new-password"/>
        </div>
        <button class="btn btn-green" id="join-btn">Create Account &amp; Join Team</button>
        <div id="join-msg"></div>
        <div class="divider"><span>Already have an account?</span></div>
        <button class="btn btn-outline" id="signin-toggle">Sign in instead</button>
      </div>
    `;

    document.getElementById('join-btn').addEventListener('click', handleSignup);
    document.getElementById('signin-toggle').addEventListener('click', showSignInForm);
  }

  function showSignInForm() {
    document.getElementById('form-area').innerHTML = `
      <div class="field">
        <label>Email</label>
        <input type="email" id="j-email" value="${esc(invite.email || '')}" placeholder="you@email.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="j-pass" placeholder="Your password" autocomplete="current-password"/>
      </div>
      <button class="btn btn-green" id="join-btn">Sign In &amp; Join Team</button>
      <div id="join-msg"></div>
      <div class="divider"><span>New to SWFT?</span></div>
      <button class="btn btn-outline" onclick="renderJoinUI(null)">Create a new account</button>
    `;
    document.getElementById('join-btn').addEventListener('click', handleSignIn);
  }

  async function handleSignup() {
    const firstName = document.getElementById('j-firstname')?.value?.trim() || '';
    const lastName = document.getElementById('j-lastname')?.value?.trim() || '';
    const name = [firstName, lastName].filter(Boolean).join(' ');
    const email = document.getElementById('j-email').value.trim();
    const pass = document.getElementById('j-pass').value;

    if (!firstName) { showMsg('Enter your first name', true); return; }
    if (!lastName) { showMsg('Enter your last name', true); return; }
    if (!email) { showMsg('Enter your email', true); return; }
    if (pass.length < 6) { showMsg('Password must be at least 6 characters', true); return; }

    setLoading(true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      // Set display name on the Firebase account
      await updateProfile(cred.user, { displayName: name });
      await acceptInvite(cred.user, name);
    } catch(e) {
      setLoading(false);
      showMsg(friendlyError(e.code, e.message), true);
    }
  }

  async function handleSignIn() {
    const email = document.getElementById('j-email').value.trim();
    const pass = document.getElementById('j-pass').value;
    if (!email || !pass) { showMsg('Enter email and password', true); return; }

    setLoading(true);
    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      await acceptInvite(cred.user);
    } catch(e) {
      setLoading(false);
      showMsg(friendlyError(e.code, e.message), true);
    }
  }

  async function acceptInvite(user, displayName) {
    const msgEl = document.getElementById('join-msg');
    try {
      if (msgEl) msgEl.innerHTML = '<p class="msg-loading" style="margin-top:10px;">Joining team...</p>';
      const idToken = await user.getIdToken();
      const body = { token };
      if (displayName) body.name = displayName;
      const res = await fetch('/api/team/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.error) {
        setLoading(false);
        if (msgEl) msgEl.innerHTML = '<p class="msg-error">' + esc(data.error) + '</p>';
      } else {
        if (msgEl) msgEl.innerHTML = '<p class="msg-success">Welcome to the team! Taking you to the app...</p>';
        setTimeout(() => { window.location.href = 'swft-dashboard'; }, 1200);
      }
    } catch(e) {
      setLoading(false);
      if (msgEl) msgEl.innerHTML = '<p class="msg-error">Something went wrong. Please try again.</p>';
    }
  }

  function setLoading(on) {
    const btn = document.getElementById('join-btn');
    if (btn) { btn.disabled = on; btn.textContent = on ? 'Please wait...' : btn.dataset.label || btn.textContent; }
  }

  function showMsg(msg, isError) {
    const el = document.getElementById('join-msg');
    if (el) el.innerHTML = '<p class="' + (isError ? 'msg-error' : 'msg-success') + '">' + esc(msg) + '</p>';
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function friendlyError(code, fallback) {
    const map = {
      'auth/email-already-in-use': 'An account with this email already exists. Try signing in instead.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/user-not-found': 'No account found with that email.',
      'auth/too-many-requests': 'Too many attempts. Please wait a moment and try again.',
    };
    return map[code] || fallback || 'Something went wrong. Please try again.';
  }
</script>
<script src="swft-mobile.js"></script>
</body>
</html>
