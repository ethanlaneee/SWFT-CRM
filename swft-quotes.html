<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SWFT — Quotes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--surface:#111111;--surface2:#181818;--border:#1f1f1f;--border2:#2c2c2c;--green:#c8f135;--white:#f0f0f0;--gray:#7a7a7a;--gray2:#444444;--blue:#4d9fff;--amber:#f5a623;--red:#ff5252;--sidebar-w:228px;}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:#0a0a0a;}
body{visibility:hidden;background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;}

.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);}
.sidebar.collapsed{transform:translateX(-100%);}
.collapse-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);flex-shrink:0;transition:all 0.14s;}
.collapse-btn:hover{background:var(--surface2);color:var(--white);}
.sidebar-toggle{position:fixed;top:14px;left:14px;z-index:9000;width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all 0.15s;opacity:0;pointer-events:none;}
.sidebar-toggle.visible{opacity:1;pointer-events:all;}
.logo-wrap{padding:26px 22px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--white);line-height:1;}
.logo-mark em{color:var(--green);font-style:normal;}
.logo-sub{font-size:9.5px;color:var(--gray2);letter-spacing:1.8px;margin-top:3px;font-weight:300;}
.nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.nav-label{font-size:9.5px;letter-spacing:2.5px;color:var(--gray2);text-transform:uppercase;padding:14px 12px 5px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:400;color:var(--gray);transition:background 0.14s,color 0.14s;position:relative;user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--white);}
.nav-item.active{background:rgba(200,241,53,0.07);color:var(--green);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--green);border-radius:0 3px 3px 0;}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:0.8;}
.nav-item.active .nav-icon{opacity:1;}
.sidebar-footer{border-top:1px solid var(--border);padding:12px 10px;}
.user-tile{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:background 0.14s;}
.user-tile:hover{background:var(--surface2);}
.s-avatar{width:30px;height:30px;border-radius:50%;background:var(--green);color:#0a0a0a;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-name{font-size:12px;font-weight:500;color:var(--white);}
.user-role{font-size:10.5px;color:var(--gray2);margin-top:1px;}

.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left 0.28s cubic-bezier(0.22,1,0.36,1);}
.main.expanded{margin-left:0!important;}
.main.expanded .topbar{padding-left:56px;}
.topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;background:rgba(10,10,10,0.9);backdrop-filter:blur(14px);z-index:100;}
.topbar-page{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2.5px;color:var(--white);}
.topbar-slash{color:var(--border2);font-family:'JetBrains Mono',monospace;font-size:16px;}
.topbar-sub{font-size:12px;color:var(--gray);font-style:italic;font-weight:300;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.btn-primary{display:flex;align-items:center;gap:7px;background:var(--green);color:#0a0a0a;font-weight:700;font-size:12.5px;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;transition:all 0.18s;}
.btn-primary:hover{background:#d5ff40;transform:translateY(-1px);}

.page-body{flex:1;padding:28px;display:flex;flex-direction:column;gap:18px;}

/* Stats */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px 20px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c);}
.stat-card.c-blue{--c:var(--blue);}.stat-card.c-green{--c:var(--green);}.stat-card.c-amber{--c:var(--amber);}.stat-card.c-red{--c:var(--red);}
.stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:var(--white);line-height:1;margin-top:5px;}
.stat-sub{font-size:11px;color:var(--gray2);margin-top:4px;}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;}
.search-wrap{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:9px 14px;flex:1;max-width:320px;transition:border-color 0.15s;}
.search-wrap:focus-within{border-color:var(--green);}
.search-input{background:transparent;border:none;outline:none;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;flex:1;}
.search-input::placeholder{color:var(--gray2);}
.filter-group{display:flex;gap:4px;}
.ftab{font-size:11.5px;font-weight:500;padding:7px 13px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);color:var(--gray);transition:all 0.14s;user-select:none;}
.ftab:hover{color:var(--white);border-color:var(--gray2);}
.ftab.active{background:rgba(200,241,53,0.1);color:var(--green);border-color:rgba(200,241,53,0.25);}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.table-head{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 0.8fr 50px;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
.th{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray2);font-weight:600;}
.q-row{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 0.8fr 50px;padding:13px 20px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.12s;}
.q-row:last-child{border-bottom:none;}
.q-row:hover{background:var(--surface2);}
.q-customer{font-size:13px;font-weight:500;color:var(--white);}
.q-job{font-size:11px;color:var(--gray);margin-top:2px;}
.q-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gray);}
.q-total{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--white);}
.status-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:0.4px;display:inline-block;}
.s-draft{background:rgba(100,100,100,0.12);color:var(--gray);}
.s-sent{background:rgba(77,159,255,0.12);color:var(--blue);}
.s-approved{background:rgba(200,241,53,0.12);color:var(--green);}
select.status-pill{cursor:pointer;border:none;-webkit-appearance:none;appearance:none;outline:none;font-family:inherit;}
select.status-pill option{background:#141414;color:#e0e0e0;}
.row-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray2);transition:all 0.14s;margin-left:auto;}
.row-btn:hover{background:var(--surface2);color:var(--green);border-color:var(--green);}
.empty-state{text-align:center;padding:40px;color:var(--gray);font-size:13px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s;padding:24px;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.pdf-modal{background:#fff;border-radius:14px;width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(0.96);transition:transform 0.25s cubic-bezier(0.22,1,0.36,1);box-shadow:0 24px 80px rgba(0,0,0,0.5);color:#111;}
.modal-overlay.open .pdf-modal{transform:scale(1);}
.pdf-doc-header{padding:28px 32px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.pdf-brand{display:flex;flex-direction:column;}
.pdf-company-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#111;line-height:1;}
.pdf-company-name em{color:#8ab800;font-style:normal;}
.pdf-company-logo{max-height:50px;max-width:180px;object-fit:contain;margin-bottom:4px;}
.pdf-tagline{font-size:10px;color:#999;letter-spacing:1.5px;margin-top:4px;}
.pdf-close{width:30px;height:30px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#666;font-size:16px;flex-shrink:0;}
.pdf-close:hover{background:#eee;color:#333;}
.pdf-doc-body{flex:1;overflow-y:auto;padding:20px 32px 28px;}
.pdf-type-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #8ab800;}
.pdf-type-label{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#111;}
.pdf-status-select{background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:12px;color:#333;outline:none;cursor:pointer;}
.pdf-status-select:focus{border-color:#8ab800;}
.pdf-fields{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.pdf-field-row{display:flex;align-items:center;justify-content:space-between;min-height:32px;}
.pdf-field-label{font-size:12px;color:#888;flex-shrink:0;min-width:90px;}
.pdf-field-input{background:transparent;border:none;border-bottom:1px dashed transparent;padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:13px;color:#111;font-weight:500;text-align:right;outline:none;flex:1;max-width:280px;transition:border-color 0.15s;}
.pdf-field-input:hover{border-bottom-color:#ccc;}
.pdf-field-input:focus{border-bottom:2px solid #8ab800;padding-bottom:3px;}
.pdf-field-input::placeholder{color:#ccc;font-weight:400;}
.pdf-field-select{background:transparent;border:none;border-bottom:1px dashed transparent;padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:13px;color:#111;font-weight:500;text-align:right;outline:none;cursor:pointer;flex:1;max-width:280px;direction:rtl;}
.pdf-field-select:hover{border-bottom-color:#ccc;}
.pdf-field-select:focus{border-bottom:2px solid #8ab800;}
.pdf-field-select option{direction:ltr;background:#fff;}
.pdf-2col{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;}
.pdf-section-label{margin-top:20px;margin-bottom:8px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#999;}
.pdf-li-header{display:grid;grid-template-columns:2fr 0.6fr 0.8fr 0.8fr 26px;padding:8px 0;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#999;border-bottom:1px solid #e0e0e0;}
.pdf-li-row{display:grid;grid-template-columns:2fr 0.6fr 0.8fr 0.8fr 26px;padding:6px 0;align-items:center;border-bottom:1px solid #f0f0f0;gap:4px;}
.pdf-li-input{background:transparent;border:none;border-bottom:1px solid transparent;padding:4px 4px;font-family:'DM Sans',sans-serif;font-size:13px;color:#111;outline:none;width:100%;transition:border-color 0.14s;}
.pdf-li-input:hover{border-bottom-color:#ccc;}
.pdf-li-input:focus{border-bottom-color:#8ab800;}
.pdf-li-input.mono{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;}
.pdf-li-total{font-family:'JetBrains Mono',monospace;font-size:12px;color:#111;font-weight:500;padding:4px;}
.pdf-li-del{width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:#ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.12s;}
.pdf-li-del:hover{background:rgba(255,82,82,0.1);color:#ff5252;}
.pdf-add-row{display:grid;grid-template-columns:2fr 0.6fr 0.8fr 0.8fr 26px;padding:8px 0;gap:4px;border-top:1px dashed #ddd;margin-top:4px;}
.pdf-add-input{background:transparent;border:1px solid #e0e0e0;border-radius:4px;padding:4px 6px;font-family:'DM Sans',sans-serif;font-size:12px;color:#111;outline:none;}
.pdf-add-input:focus{border-color:#8ab800;}
.pdf-add-input::placeholder{color:#bbb;}
.pdf-add-btn{width:22px;height:22px;border-radius:5px;background:rgba(138,184,0,0.1);border:1px solid rgba(138,184,0,0.3);color:#8ab800;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.pdf-add-btn:hover{background:rgba(138,184,0,0.2);}
.pdf-totals{margin-top:16px;display:flex;flex-direction:column;align-items:flex-end;}
.pdf-total-line{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;min-width:220px;}
.pdf-total-line.grand{font-size:18px;font-weight:700;color:#111;border-top:2px solid #111;margin-top:4px;padding-top:12px;}
.pdf-notes-label{margin-top:24px;margin-bottom:6px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#999;}
.pdf-notes-area{background:#fafafa;border:1px solid #e8e8e8;border-radius:8px;padding:12px 14px;color:#111;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;min-height:60px;resize:vertical;line-height:1.5;width:100%;transition:border-color 0.15s;}
.pdf-notes-area:focus{border-color:#8ab800;}
.pdf-doc-footer{padding:14px 24px;border-top:1px solid #e8e8e8;display:flex;gap:8px;background:#fafafa;border-radius:0 0 14px 14px;}
.pdf-btn{padding:9px 16px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#555;font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:all 0.14s;display:flex;align-items:center;gap:6px;}
.pdf-btn:hover{background:#f0f0f0;color:#111;}
.pdf-btn.primary{background:#8ab800;color:#fff;font-weight:700;border-color:#8ab800;}
.pdf-btn.primary:hover{background:#7aa300;}
.pdf-btn.danger{color:#ff5252;border-color:rgba(255,82,82,0.3);}
.pdf-btn.danger:hover{background:rgba(255,82,82,0.05);}
.pdf-spacer{flex:1;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px 20px;font-size:13px;color:var(--white);display:flex;align-items:center;gap:8px;z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="logo-wrap">
    <div><div class="logo-mark">SWFT<em>.</em></div><div class="logo-sub">simple. smart. swft.</div></div>
    <div class="collapse-btn" onclick="toggleSidebar()"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="12" x2="15" y2="12" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="18" x2="9" y2="18" stroke-width="2" stroke-linecap="round"/></svg></div>
  </div>
  <nav class="nav">
    <div class="nav-label">Main</div>
    <div class="nav-item" onclick="window.location.href='swft-dashboard'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke-width="1.8"/></svg>Dashboard</div>
    <div class="nav-item" onclick="window.location.href='swft-customers'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="1.8"/><circle cx="9" cy="7" r="4" stroke-width="1.8"/></svg>Customers</div>
    <div class="nav-item" onclick="window.location.href='swft-jobs'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke-width="1.8"/></svg>Jobs</div>
    <div class="nav-item active"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-width="1.8"/><polyline points="14,2 14,8 20,8" stroke-width="1.8"/><line x1="16" y1="13" x2="8" y2="13" stroke-width="1.8"/><line x1="16" y1="17" x2="8" y2="17" stroke-width="1.8"/></svg>Quotes</div>
    <div class="nav-item" onclick="window.location.href='swft-schedule'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke-width="1.8"/><line x1="16" y1="2" x2="16" y2="6" stroke-width="1.8"/><line x1="8" y1="2" x2="8" y2="6" stroke-width="1.8"/><line x1="3" y1="10" x2="21" y2="10" stroke-width="1.8"/></svg>Schedule</div>
    <div class="nav-item" onclick="window.location.href='swft-invoices'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23" stroke-width="1.8"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke-width="1.8" stroke-linecap="round"/></svg>Invoices</div>
    <div class="nav-item" onclick="window.location.href='swft-messages'"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-width="1.8"/></svg>Messages</div>
  </nav>
  <div class="sidebar-footer"><div class="nav-item" onclick="window.location.href='swft-settings'" style="margin-bottom:4px;"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-width="1.8"/></svg>Settings</div>
    <div class="user-tile"><div class="s-avatar"></div><div><div class="user-name"></div><div class="user-role"></div></div></div>
  </div>
</aside>

<div class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="12" x2="21" y2="12" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="18" x2="21" y2="18" stroke-width="2" stroke-linecap="round"/></svg></div>

<div class="main" id="main">
  <header class="topbar">
    <div class="topbar-page">QUOTES</div>
    <span class="topbar-slash">/</span>
    <div class="topbar-sub" id="q-count">loading...</div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openNewQuote()">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke-width="2.5" stroke-linecap="round"/></svg>
        New Quote
      </button>
    </div>
  </header>

  <div class="page-body">
    <div class="stat-row" id="stat-row"></div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke-width="1.8"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke-width="1.8"/></svg>
        <input class="search-input" placeholder="Search quotes..." oninput="filterQuotes(this.value)"/>
      </div>
      <div class="filter-group">
        <div class="ftab active" onclick="setFilter(this,'all')">All</div>
        <div class="ftab" onclick="setFilter(this,'draft')">Draft</div>
        <div class="ftab" onclick="setFilter(this,'sent')">Sent</div>
        <div class="ftab" onclick="setFilter(this,'approved')">Approved</div>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-head">
        <div class="th">Customer / Job</div>
        <div class="th">Service</div>
        <div class="th">Created</div>
        <div class="th">Total</div>
        <div class="th">Status</div>
        <div class="th"></div>
      </div>
      <div id="quotes-body"><div class="empty-state">Loading...</div></div>
    </div>
  </div>
</div>

<!-- PDF-style Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="pdf-modal">
    <div class="pdf-doc-header">
      <div class="pdf-brand" id="pdf-brand"></div>
      <div class="pdf-close" onclick="closeModal()">&times;</div>
    </div>
    <div class="pdf-doc-body">
      <div class="pdf-type-row">
        <div class="pdf-type-label">QUOTE</div>
        <select class="pdf-status-select" id="f-status"><option value="draft">Draft</option><option value="sent">Sent</option><option value="approved">Approved</option></select>
      </div>
      <div class="pdf-fields">
        <div class="pdf-field-row">
          <span class="pdf-field-label">Customer</span>
          <select class="pdf-field-select" id="f-customer"></select>
        </div>
        <div class="pdf-2col">
          <div class="pdf-field-row"><span class="pdf-field-label">Service</span><input class="pdf-field-input" id="f-service" placeholder="e.g. Stamped Concrete"/></div>
          <div class="pdf-field-row"><span class="pdf-field-label">Sqft</span><input class="pdf-field-input" id="f-sqft" placeholder="e.g. 500"/></div>
        </div>
        <div class="pdf-field-row"><span class="pdf-field-label">Address</span><input class="pdf-field-input" id="f-address" placeholder="Property address"/></div>
        <div class="pdf-2col">
          <div class="pdf-field-row"><span class="pdf-field-label">Scheduled</span><input class="pdf-field-input" id="f-scheduled" type="date"/></div>
          <div class="pdf-field-row"><span class="pdf-field-label">Finish</span><input class="pdf-field-input" id="f-finish" placeholder="e.g. Broom finish"/></div>
        </div>
      </div>
      <div class="pdf-section-label">Line Items</div>
      <div class="pdf-li-header"><div>Description</div><div>Qty</div><div>Rate</div><div>Total</div><div></div></div>
      <div id="li-body"></div>
      <div class="pdf-add-row">
        <input class="pdf-add-input" id="add-desc" placeholder="Add description..."/>
        <input class="pdf-add-input" id="add-qty" placeholder="Qty" style="text-align:center;"/>
        <input class="pdf-add-input" id="add-rate" placeholder="$ Rate"/>
        <input class="pdf-add-input" id="add-total" placeholder="Total" readonly style="color:#8ab800;font-weight:500;"/>
        <button class="pdf-add-btn" onclick="addLineItem()">+</button>
      </div>
      <div class="pdf-totals" id="totals-area"></div>
      <div class="pdf-notes-label">Notes</div>
      <textarea class="pdf-notes-area" id="f-notes" placeholder="Add notes..."></textarea>
    </div>
    <div class="pdf-doc-footer">
      <button class="pdf-btn danger" id="btn-delete" onclick="deleteQuote()" style="display:none;">Delete</button>
      <div class="pdf-spacer"></div>
      <button class="pdf-btn" onclick="printQuotePdf()">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" stroke-width="1.8"/><rect x="6" y="14" width="12" height="8" stroke-width="1.8"/></svg>
        Print / Save PDF
      </button>
      <button class="pdf-btn" onclick="saveQuote('draft')">Save Draft</button>
      <button class="pdf-btn primary" onclick="saveQuote('send')">Send Quote</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script>
var _quotes=[];
var _customers=[];
var _currentQuote=null; // {id,items,...} or null for new
var _items=[];          // current line items in modal
var _filter='all';
var _search='';

function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('collapsed');document.getElementById('main').classList.toggle('expanded');document.getElementById('sidebar-toggle').classList.toggle('visible');}
var _tt;function showToast(m){var t=document.getElementById('toast');document.getElementById('toast-msg').textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2500);}

// ── Load ──
async function loadQuotes(){
  try{
    var res=await Promise.all([API.quotes.list(),API.customers.list()]);
    _quotes=res[0];_customers=res[1];
    renderStats();renderTable();
  }catch(e){console.error(e);}
}

// ── Stats ──
function renderStats(){
  var total=_quotes.length,totalVal=0,approved=0,approvedVal=0,pending=0,pendingVal=0,declined=0;
  _quotes.forEach(function(q){
    var v=Number(q.total)||0;totalVal+=v;
    if(q.status==='approved'){approved++;approvedVal+=v;}
    else if(q.status==='sent'||q.status==='draft'){pending++;pendingVal+=v;}
    else{declined++;}
  });
  document.getElementById('q-count').textContent=total+' quotes';
  document.getElementById('stat-row').innerHTML=
    '<div class="stat-card c-blue"><div class="stat-label">Total Quotes</div><div class="stat-value">'+total+'</div><div class="stat-sub">$'+totalVal.toLocaleString()+' total value</div></div>'+
    '<div class="stat-card c-green"><div class="stat-label">Approved</div><div class="stat-value">'+approved+'</div><div class="stat-sub">$'+approvedVal.toLocaleString()+'</div></div>'+
    '<div class="stat-card c-amber"><div class="stat-label">Pending</div><div class="stat-value">'+pending+'</div><div class="stat-sub">$'+pendingVal.toLocaleString()+' pipeline</div></div>'+
    '<div class="stat-card c-red"><div class="stat-label">Declined</div><div class="stat-value">'+declined+'</div><div class="stat-sub">&nbsp;</div></div>';
}

// ── Table ──
function renderTable(){
  var body=document.getElementById('quotes-body');
  var list=_quotes.slice();
  if(_filter!=='all')list=list.filter(function(q){return q.status===_filter;});
  if(_search){var s=_search.toLowerCase();list=list.filter(function(q){return(q.customerName||'').toLowerCase().indexOf(s)>-1||(q.service||'').toLowerCase().indexOf(s)>-1;});}

  if(!list.length){body.innerHTML='<div class="empty-state">No quotes found</div>';return;}

  body.innerHTML=list.map(function(q){
    var created=q.createdAt?new Date(q.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    var total='$'+Number(q.total||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    var sc=q.status==='approved'?'s-approved':q.status==='sent'?'s-sent':'s-draft';
    var st=q.status||'draft';
    return '<div class="q-row" onclick="openQuote(\''+q.id+'\')">'+
      '<div><div class="q-customer">'+(q.customerName||'Unnamed')+'</div><div class="q-job">'+(q.service||'')+(q.finish?' — '+q.finish:'')+'</div></div>'+
      '<div class="q-date">'+(q.service||'—')+'</div>'+
      '<div class="q-date">'+created+'</div>'+
      '<div class="q-total">'+total+'</div>'+
      '<div><select class="status-pill '+sc+'" onclick="event.stopPropagation()" onchange="changeQuoteStatus(\''+q.id+'\',this.value,this)">'+
        '<option value="draft"'+(st==='draft'?' selected':'')+'>draft</option>'+
        '<option value="sent"'+(st==='sent'?' selected':'')+'>sent</option>'+
        '<option value="approved"'+(st==='approved'?' selected':'')+'>approved</option>'+
      '</select></div>'+
      '<div><div class="row-btn">→</div></div>'+
    '</div>';
  }).join('');
}

function setFilter(el,f){_filter=f;document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');renderTable();}
function filterQuotes(q){_search=q;renderTable();}

async function changeQuoteStatus(id,val,el){
  var sc=val==='approved'?'s-approved':val==='sent'?'s-sent':'s-draft';
  el.className='status-pill '+sc;
  var q=_quotes.find(function(i){return i.id===id;});
  var prev=q?q.status:'draft';
  if(q)q.status=val;
  try{await API.quotes.update(id,{status:val});renderStats();showToast('Status updated');}
  catch(e){showToast('Error updating status');if(q)q.status=prev;el.className='status-pill '+(prev==='approved'?'s-approved':prev==='sent'?'s-sent':'s-draft');}
}

// ── Modal ──
async function openQuote(id){
  try{
    var q=await API.quotes.get(id);
    _currentQuote=q;
    _items=(q.items||[]).map(function(i){return{desc:i.desc||'',qty:Number(i.qty)||1,rate:Number(i.rate)||0,total:Number(i.total)||0};});
    populateModal(q);
    document.getElementById('btn-delete').style.display='';
    document.getElementById('modal-overlay').classList.add('open');
  }catch(e){showToast('Error loading quote');}
}

function openNewQuote(){
  _currentQuote=null;_items=[];
  populateModal({});
  document.getElementById('btn-delete').style.display='none';
  document.getElementById('modal-overlay').classList.add('open');
}

function populateModal(q){
  // Render company brand header
  var brand=document.getElementById('pdf-brand');
  var s=window._swftSettings||{};
  if(s.companyLogo){brand.innerHTML='<img class="pdf-company-logo" src="'+s.companyLogo+'"/><div class="pdf-tagline">'+(s.phone||'')+' &nbsp; '+(s.address||'')+'</div>';}
  else{brand.innerHTML='<div class="pdf-company-name">'+(s.company||'SWFT')+'<em>.</em></div><div class="pdf-tagline">'+(s.phone?s.phone+' &nbsp; ':'')+(s.address||'simple. smart. swft.')+'</div>';}

  // Customer dropdown
  var sel=document.getElementById('f-customer');
  sel.innerHTML='<option value="">Select customer...</option>';
  _customers.forEach(function(c){
    var o=document.createElement('option');o.value=c.id;o.textContent=c.name||'Unnamed';
    if(c.id===q.customerId)o.selected=true;
    sel.appendChild(o);
  });

  document.getElementById('f-status').value=q.status||'draft';
  document.getElementById('f-service').value=q.service||'';
  document.getElementById('f-sqft').value=q.sqft||'';
  document.getElementById('f-address').value=q.address||'';
  document.getElementById('f-finish').value=q.finish||'';
  document.getElementById('f-notes').value=q.notes||'';
  document.getElementById('f-scheduled').value=q.scheduledDate?new Date(q.scheduledDate).toISOString().split('T')[0]:'';

  renderLineItems();
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

// ── Line items ─��
function renderLineItems(){
  var body=document.getElementById('li-body');
  body.innerHTML=_items.map(function(item,i){
    return '<div class="pdf-li-row">'+
      '<input class="pdf-li-input" value="'+esc(item.desc)+'" onchange="updateItem('+i+',\'desc\',this.value)"/>'+
      '<input class="pdf-li-input mono" value="'+item.qty+'" type="number" min="1" onchange="updateItem('+i+',\'qty\',this.value)"/>'+
      '<input class="pdf-li-input mono" value="'+item.rate.toFixed(2)+'" type="number" step="0.01" onchange="updateItem('+i+',\'rate\',this.value)"/>'+
      '<div class="pdf-li-total">$'+item.total.toFixed(2)+'</div>'+
      '<button class="pdf-li-del" onclick="removeItem('+i+')">&times;</button>'+
    '</div>';
  }).join('');
  renderTotals();
}

function updateItem(i,field,val){
  if(field==='desc')_items[i].desc=val;
  else if(field==='qty'){_items[i].qty=Number(val)||1;_items[i].total=_items[i].qty*_items[i].rate;}
  else if(field==='rate'){_items[i].rate=Number(val)||0;_items[i].total=_items[i].qty*_items[i].rate;}
  renderLineItems();
}

function removeItem(i){_items.splice(i,1);renderLineItems();}

function addLineItem(){
  var desc=document.getElementById('add-desc').value.trim();
  var qty=Number(document.getElementById('add-qty').value)||1;
  var rate=Number(document.getElementById('add-rate').value)||0;
  if(!desc){showToast('Enter a description');return;}
  _items.push({desc:desc,qty:qty,rate:rate,total:qty*rate});
  document.getElementById('add-desc').value='';document.getElementById('add-qty').value='';document.getElementById('add-rate').value='';document.getElementById('add-total').value='';
  renderLineItems();
}

// Auto-calc add row total
['add-qty','add-rate'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(){
    var q=parseFloat(document.getElementById('add-qty').value)||0;
    var r=parseFloat(document.getElementById('add-rate').value)||0;
    document.getElementById('add-total').value=q&&r?'$'+(q*r).toFixed(2):'';
  });
});

function renderTotals(){
  var subtotal=_items.reduce(function(s,i){return s+i.total;},0);
  document.getElementById('totals-area').innerHTML=
    '<div class="pdf-total-line"><span>Subtotal</span><span>$'+subtotal.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})+'</span></div>'+
    '<div class="pdf-total-line grand"><span>Total</span><span>$'+subtotal.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})+'</span></div>';
}

function printQuotePdf(){
  var s=window._swftSettings||{};
  var brandHtml=s.companyLogo?'<img src="'+s.companyLogo+'" style="max-height:50px;max-width:180px;object-fit:contain;margin-bottom:8px;"/>':'<div class="pdf-company">'+(s.company||'SWFT')+'<em>.</em></div>';
  var tagline=s.company?(s.phone||'')+' &nbsp; '+(s.address||''):'simple. smart. swft.';
  var custSel=document.getElementById('f-customer');var custName=custSel.options[custSel.selectedIndex]?custSel.options[custSel.selectedIndex].textContent:'—';
  var lines=_items.map(function(l){return'<div class="pdf-line"><div>'+esc(l.desc)+'</div><div>'+(l.qty||1)+'</div><div>$'+l.rate.toFixed(2)+'</div><div class="amt">$'+l.total.toFixed(2)+'</div></div>';}).join('');
  var total=_items.reduce(function(s,i){return s+i.total;},0);
  var sched=document.getElementById('f-scheduled').value?new Date(document.getElementById('f-scheduled').value).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
  var win=window.open('','_blank');
  win.document.write('<html><head><title>Quote</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><style>body{font-family:"DM Sans",sans-serif;padding:40px;color:#111;max-width:700px;margin:0 auto;}.pdf-company{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:3px;}.pdf-company em{color:#8ab800;font-style:normal;}img{max-height:50px;max-width:180px;object-fit:contain;}.pdf-tagline{font-size:10px;color:#999;letter-spacing:1.5px;margin-bottom:20px;}.pdf-type{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:2px;padding-bottom:8px;border-bottom:2px solid #8ab800;margin-bottom:16px;}.pdf-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;}.label{color:#666;}.value{font-weight:500;}.pdf-section{margin-top:20px;margin-bottom:8px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#999;}.pdf-line-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:8px 0;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#999;border-bottom:1px solid #e0e0e0;}.pdf-line{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:10px 0;font-size:13px;border-bottom:1px solid #f0f0f0;}.amt{font-weight:500;}.pdf-total-row{display:flex;justify-content:space-between;padding:10px 0;font-size:14px;}.pdf-total-row.grand{font-size:18px;font-weight:700;border-top:2px solid #111;margin-top:4px;padding-top:12px;}</style></head><body>'+brandHtml+'<div class="pdf-tagline">'+tagline+'</div><div class="pdf-type">QUOTE</div><div class="pdf-row"><span class="label">Customer</span><span class="value">'+esc(custName)+'</span></div><div class="pdf-row"><span class="label">Service</span><span class="value">'+esc(document.getElementById('f-service').value||'—')+'</span></div><div class="pdf-row"><span class="label">Address</span><span class="value">'+esc(document.getElementById('f-address').value||'—')+'</span></div><div class="pdf-row"><span class="label">Scheduled</span><span class="value">'+sched+'</span></div><div class="pdf-section">Line Items</div><div class="pdf-line-header"><div>Description</div><div>Qty</div><div>Rate</div><div>Total</div></div>'+lines+'<div style="margin-top:12px;"><div class="pdf-total-row"><span>Subtotal</span><span>$'+total.toFixed(2)+'</span></div><div class="pdf-total-row grand"><span>Total</span><span>$'+total.toFixed(2)+'</span></div></div></body></html>');
  win.document.close();setTimeout(function(){win.print();},500);
}

// ── Save ──
async function saveQuote(action){
  var custSel=document.getElementById('f-customer');
  var custOpt=custSel.options[custSel.selectedIndex];
  if(!custSel.value){showToast('Select a customer');return;}

  var total=_items.reduce(function(s,i){return s+i.total;},0);
  var data={
    customerId:custSel.value,
    customerName:custOpt.textContent,
    items:_items,
    total:total,
    status:document.getElementById('f-status').value,
    service:document.getElementById('f-service').value,
    sqft:document.getElementById('f-sqft').value,
    address:document.getElementById('f-address').value,
    finish:document.getElementById('f-finish').value,
    notes:document.getElementById('f-notes').value,
    scheduledDate:document.getElementById('f-scheduled').value?new Date(document.getElementById('f-scheduled').value).getTime():null
  };

  try{
    if(_currentQuote&&_currentQuote.id){
      await API.quotes.update(_currentQuote.id,data);
      if(action==='send')await API.quotes.send(_currentQuote.id);
      showToast(action==='send'?'Quote sent':'Quote saved');
    }else{
      var created=await API.quotes.create(data);
      if(action==='send'&&created.id)await API.quotes.send(created.id);
      showToast(action==='send'?'Quote created & sent':'Quote created');
    }
    closeModal();
    loadQuotes();
  }catch(e){showToast('Error: '+e.message);}
}

async function deleteQuote(){
  if(!_currentQuote||!_currentQuote.id)return;
  if(!confirm('Delete this quote? This cannot be undone.'))return;
  try{
    await API.quotes.delete(_currentQuote.id);
    showToast('Quote deleted');closeModal();loadQuotes();
  }catch(e){showToast('Error: '+e.message);}
}

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
